        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');

    function openReportWindow(report) {

    function downloadReportHtml(report) {

      link.remove();
      URL.revokeObjectURL(link.href);
    }

    function copyComputedStyles(source, target) {
      const computed = window.getComputedStyle(source);
      const styleText = Array.from(computed).map(name => `${name}:${computed.getPropertyValue(name)};`).join("");
      target.setAttribute("style", styleText);
      Array.from(source.children).forEach((child, index) => {
        if (target.children[index]) copyComputedStyles(child, target.children[index]);
      });
    }

    async function createReportImageBlob(report) {
      const node = $("#preview");
      if (!node) {
        throw new Error("没有可下载的报告。");
      }
      if (!currentReport) {
        throw new Error("请先生成报告。");
      }
      const rect = node.getBoundingClientRect();
      const width = Math.ceil(Math.max(rect.width, 980));
      const height = Math.ceil(node.scrollHeight + 24);
      const clone = node.cloneNode(true);
      copyComputedStyles(node, clone);
      const serialized = new XMLSerializer().serializeToString(clone);
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">
          <foreignObject width="100%" height="100%">
            <div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;background:#0b1220;padding:12px;box-sizing:border-box;">
              ${serialized}
            </div>
          </foreignObject>
        </svg>`;
      const url = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      const img = new Image();
      img.decoding = "async";
      return await new Promise((resolve, reject) => {
        img.onload = () => {
          try {
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            if (!ctx) {
              reject(new Error("图片导出失败：画布不可用。"));
              return;
            }
            ctx.fillStyle = "#0b1220";
            ctx.fillRect(0, 0, width, height);
            ctx.drawImage(img, 0, 0);
            canvas.toBlob(jpgBlob => {
              if (!jpgBlob) {
                reject(new Error("图片导出失败。"));
                return;
              }
              resolve(jpgBlob);
            }, "image/jpeg", 0.92);
          } catch (error) {
            reject(error instanceof Error ? error : new Error(String(error)));
          }
        };
        img.onerror = () => reject(new Error("图片导出失败：浏览器未能渲染报告截图。"));
        img.src = url;
      });
    }

    async function downloadReportImage(report) {
      const jpgBlob = await createReportImageBlob(report);
      const link = document.createElement("a");
      link.href = URL.createObjectURL(jpgBlob);
      link.download = report.fileName.replace(/\.md$/i, ".jpg");
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
      setStatus("已下载图片。");
    }

    function renderMarkdown(markdown) {
      const lines = String(markdown || "").replace(/\r\n/g, "\n").split("\n");
      const out = [];
      let inCode = false;
      let codeLines = [];
      let listType = "";
      let listItems = [];
      let listHighlighted = false;
      let highlightSection = false;
      let highlightNextParagraph = false;

      const closeList = () => {
        if (!listType) return;
        const className = listHighlighted ? ' class="conclusion-highlight"' : "";
        out.push(`<${listType}${className}>${listItems.map(item => `<li>${item}</li>`).join("")}</${listType}>`);
        listType = "";
        listItems = [];
        listHighlighted = false;
      };

      const closeCode = () => {
        if (!inCode) return;
        out.push(`<pre><code>${escapeHtml(codeLines.join("\n"))}</code></pre>`);
        inCode = false;
        codeLines = [];
      };

      const flushTable = (tableLines) => {
        if (!tableLines.length) return;
        const rows = tableLines.map(line => line.trim().replace(/^\||\|$/g, "").split("|").map(cell => cell.trim()));
        if (rows.length < 2) return;
        const header = rows[0];
        const body = rows.slice(2).filter(row => row.some(cell => cell));
        const headHtml = header.map(cell => `<th>${inlineMarkdown(cell)}</th>`).join("");
        const bodyHtml = body.map(row => `<tr>${row.map(cell => `<td>${inlineMarkdown(cell)}</td>`).join("")}</tr>`).join("");
        const className = highlightSection ? ' class="conclusion-highlight"' : "";
        out.push(`<table${className}><thead><tr>${headHtml}</tr></thead><tbody>${bodyHtml}</tbody></table>`);
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        const trimmed = line.trim();

        if (trimmed.startsWith("```")) {
          if (inCode) {
            closeCode();
          } else {
            closeList();
            inCode = true;
            codeLines = [];
          }
          continue;
        }
        if (inCode) {
          codeLines.push(line);
          continue;
        }

        const isTableRow = /^\|.+\|$/.test(trimmed);
        if (isTableRow) {
          closeList();
          const tableLines = [];
          while (i < lines.length && /^\|.+\|$/.test(lines[i].trim())) {
            tableLines.push(lines[i]);
            i += 1;
          }
          i -= 1;
          flushTable(tableLines);
          continue;
        }

        if (/^<details[\s>]/i.test(trimmed)) {
          closeList();
          const htmlLines = [line];
          while (i + 1 < lines.length) {
            i += 1;
            htmlLines.push(lines[i]);
            if (/<\/details>/i.test(lines[i])) break;
          }
          out.push(htmlLines.join("\n"));
          continue;
        }

        if (!trimmed) {
          closeList();
          out.push("");
          continue;
        }

        const heading = trimmed.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          const headingText = heading[2];
          highlightSection = /市场在交易什么/.test(headingText);
          highlightNextParagraph = highlightSection;
          out.push(`<h${level}>${inlineMarkdown(headingText)}</h${level}>`);
          continue;
        }

        if (/^>\s?/.test(trimmed)) {
          closeList();
          const quoteText = trimmed.replace(/^>\s?/, "");
          const quoteClass = /^(\*\*)?(数据口径|数据告警)/.test(quoteText) ? ' class="data-note"' : "";
          out.push(`<blockquote${quoteClass}>${inlineMarkdown(quoteText)}</blockquote>`);
          continue;
        }

        if (/^( {4,}|\t)/.test(line)) {
          closeList();
          const blockLines = [line.replace(/^( {4}|\t)/, "")];
          while (i + 1 < lines.length && /^( {4,}|\t)/.test(lines[i + 1])) {
            i += 1;
            blockLines.push(lines[i].replace(/^( {4}|\t)/, ""));
          }
          out.push(`<pre><code>${escapeHtml(blockLines.join("\n"))}</code></pre>`);
          continue;
        }

        const bullet = trimmed.match(/^[-*]\s+(.*)$/);
        if (bullet) {
          if (listType !== "ul") {
            closeList();
            listType = "ul";
            listHighlighted = highlightSection;
          }
          listItems.push(inlineMarkdown(bullet[1]));
          continue;
        }

        const ordered = trimmed.match(/^\d+\.\s+(.*)$/);
        if (ordered) {
          if (listType !== "ol") {
            closeList();
            listType = "ol";
            listHighlighted = highlightSection;
          }
          listItems.push(inlineMarkdown(ordered[1]));
          continue;
        }

        closeList();
        const isConclusion = highlightSection || highlightNextParagraph || /^(\*\*)?当前[（(]/.test(trimmed);
        highlightNextParagraph = false;
        out.push(`<p${isConclusion ? ' class="conclusion-highlight"' : ""}>${inlineMarkdown(trimmed)}</p>`);
      }

      closeCode();
      closeList();
      return out.filter(Boolean).join("\n");
    }

    function switchView(view) {

    function reportTypeLabel(kind) {
      if (kind === "weekly") return "周报";

    function stopGenerationTimer() {
      if (generationTimer) {
        clearInterval(generationTimer);
        generationTimer = null;
      }
      generationStartedAt = 0;
    }

    function startGenerationTimer(kind) {
      stopGenerationTimer();
      generationStartedAt = Date.now();
      const tick = () => {
        const seconds = Math.max(0, Math.floor((Date.now() - generationStartedAt) / 1000));
        setStatus(`正在生成报告... ${seconds}s`);
        const preview = $("#preview");
        if (preview?.querySelector(".empty-state")) {
          preview.innerHTML = `<div class="empty-state">正在生成报告...<br><span>已运行 ${seconds}s</span></div>`;
        }
      };
      tick();
      generationTimer = setInterval(tick, 1000);
    }

    async function generateReport(kind) {
      currentKind = kind;
      startGenerationTimer(kind);
      switchView("preview");
      $("#preview").innerHTML = '<div class="empty-state">正在生成报告...</div>';
      let requestTimer = null;

      try {
        const controller = new AbortController();
        requestTimer = setTimeout(() => controller.abort(), REPORT_FETCH_TIMEOUT_MS);
        const response = await fetch(`${apiBase}/api/market-report-v2?kind=${encodeURIComponent(kind)}&provider=deepseek`, {
          headers: { "accept": "application/json" },
          signal: controller.signal
        });
        clearTimeout(requestTimer);
        requestTimer = null;
        const payload = await response.json();
        if (!response.ok || !payload.ok) {
          throw new Error(payload.message || `HTTP ${response.status}`);
        }
        currentReport = { ...payload.report, kind, savedAt: new Date().toISOString() };
        localStorage.setItem(latestReportKey, JSON.stringify({ ...currentReport, cachedAt: new Date().toISOString() }));
        renderReport(currentReport);
        setStatus(`已生成：${currentReport.fileName}`);
      } catch (error) {
        currentReport = null;
        renderUnavailable(error);
        setStatus(error?.name === "AbortError" ? "生成超时，请重新生成。" : "API暂时不可用，请重新生成。", true);
      } finally {
        if (requestTimer) clearTimeout(requestTimer);
        stopGenerationTimer();
      }
    }

    function renderUnavailable(error) {
      $("#filenameLabel").textContent = "尚未生成报告";
      $("#markdownOutput").value = "";
      $("#preview").innerHTML = `
        <div class="empty-state">
          API暂时不可用，请重新生成。
        </div>
      `;

    function renderReport(report) {
      $("#filenameLabel").textContent = report.fileName;
      $("#markdownOutput").value = report.markdown;
      $("#preview").innerHTML = `

          ${renderMarkdown(report.markdown)}

      `;
    }

    function restoreLatestReport() {
      try {
        const saved = JSON.parse(localStorage.getItem(latestReportKey) || "null");
        if (!saved || !saved.markdown) return;
        currentReport = saved;
        if (saved.kind) currentKind = saved.kind;
        renderReport(saved);
        switchView("preview");
        $("#filenameLabel").textContent = `${saved.fileName} · 浏览器上次报告`;
        const generatedAt = getReportGeneratedTime(saved);
        const cachedAt = saved.cachedAt;
        const suffix = cachedAt && cachedAt !== generatedAt
          ? `｜浏览器保存于 ${formatBrowserReportTime(cachedAt)}`
          : "";
        setStatus(`已恢复浏览器上次报告：原生成于 ${formatBrowserReportTime(generatedAt)}${suffix}`);
      } catch (error) {
        // ignore broken local cache
      }
    }

    function loadSavedReports() {
      try {
        const saved = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(saved) ? saved : [];
      } catch (error) {
        return [];
      }
    }

    function writeSavedReports(reports) {
      localStorage.setItem(storageKey, JSON.stringify(reports.slice(0, 100)));
    }

    function saveCurrentReport() {
      if (!currentReport) {
        setStatus("请先生成报告。", true);
        return;
      }
      const reports = loadSavedReports().filter(report => report.fileName !== currentReport.fileName);
      writeSavedReports([{ ...currentReport, savedAt: new Date().toISOString() }, ...reports]);
      renderSavedArchive();
      switchView("archive");
      setStatus("已归档到当前浏览器。");
    }

    function renderSavedArchive() {
      const container = $("#savedArchive");
      const reports = loadSavedReports();
      if (!reports.length) {
        container.innerHTML = '<div class="empty-state">还没有归档。生成报告后点击“归档当前报告”，以后就能在这里回看。</div>';
        return;
      }
      container.innerHTML = reports.map(report => `
        <article class="saved-card">
          <div>
            <strong>${escapeHtml(report.title)}</strong>
            <span>${escapeHtml(report.fileName)} / ${escapeHtml(report.windLight)} / ${escapeHtml(report.executionLevel)}</span>
            <span>${escapeHtml(report.headline)}</span>
          </div>
          <div class="card-actions">
            <button type="button" data-action="view" data-id="${escapeHtml(report.id)}">查看</button>
            <button type="button" data-action="copy" data-id="${escapeHtml(report.id)}">复制</button>
            <button type="button" data-action="download" data-id="${escapeHtml(report.id)}">下载</button>
            <button type="button" data-action="delete" data-id="${escapeHtml(report.id)}">删除</button>
          </div>
        </article>
      `).join("");
    }

    function findSavedReport(id) {
      return loadSavedReports().find(report => report.id === id);
    }

    async function copyText(text) {
      if (!text) {
        setStatus("没有可复制的内容。", true);
        return;
      }
      try {
        await navigator.clipboard.writeText(text);
        setStatus("已复制。");
      } catch (error) {
        setStatus("当前浏览器不支持自动复制，请在 Markdown 区手动选择。", true);
      }
    }

    function downloadText(fileName, text) {
      if (!text) {
        setStatus("没有可下载的内容。", true);
        return;
      }
      const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(link.href);
    }

    document.querySelectorAll("[data-kind]").forEach(button => {
      button.addEventListener("click", () => generateReport(button.dataset.kind));
    });

    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => switchView(tab.dataset.view));
    });

    $("#saveCurrent").addEventListener("click", saveCurrentReport);
    $("#openCurrent").addEventListener("click", () => {
      if (!currentReport) return setStatus("请先生成报告。", true);
      openReportWindow(currentReport);
    });
    $("#downloadCurrentHtml").addEventListener("click", () => {
      if (!currentReport) return setStatus("请先生成报告。", true);
      downloadReportHtml(currentReport);
      setStatus("已下载 HTML。");
    });
    $("#downloadCurrentImage").addEventListener("click", async () => {
      if (!currentReport) return setStatus("请先生成报告。", true);
      try {
        await downloadReportImage(currentReport);
      } catch (error) {
        setStatus(error.message || "图片导出失败。", true);
      }
    });

    $("#shareCurrentImage").addEventListener("click", async () => {
      if (!currentReport) return setStatus("请先生成报告。", true);
      try {
        const blob = await createReportImageBlob(currentReport);
        const file = new File([blob], currentReport.fileName.replace(/\.md$/i, ".jpg"), { type: "image/jpeg" });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], title: currentReport.title || currentReport.fileName, text: "市场分析报告" });
          setStatus("已打开系统分享。");
          return;
        }
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = file.name;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(link.href);
        setStatus("当前浏览器不支持直接分享，已改为保存图片。");
      } catch (error) {
        setStatus(error.message || "图片分享失败。", true);
      }
    });
    $("#copyMarkdown").addEventListener("click", () => copyText(currentReport?.markdown || ""));
    $("#copyArchive").addEventListener("click", () => copyText(currentReport?.archiveRow || ""));
    $("#downloadMarkdown").addEventListener("click", () => downloadText(currentReport?.fileName || "market-report.md", currentReport?.markdown || ""));

    $("#savedArchive").addEventListener("click", event => {
      const button = event.target.closest("button[data-action]");
      if (!button) return;
      const report = findSavedReport(button.dataset.id);
      if (!report) return;
      if (button.dataset.action === "view") {
        currentReport = report;
        localStorage.setItem(latestReportKey, JSON.stringify({ ...currentReport, cachedAt: new Date().toISOString() }));
        renderReport(report);
        switchView("preview");
        setStatus(`已打开归档：${report.fileName}（${formatBrowserReportTime(report.savedAt || report.generatedAt)}）`);
      }
      if (button.dataset.action === "copy") copyText(report.markdown);
      if (button.dataset.action === "download") downloadText(report.fileName, report.markdown);
      if (button.dataset.action === "delete") {
        writeSavedReports(loadSavedReports().filter(item => item.id !== report.id));
        renderSavedArchive();
        setStatus("已删除归档。");
      }
    });

    renderSavedArchive();
    restoreLatestReport();
  </script>
</body>
</html>
