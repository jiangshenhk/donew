name: Generate Market Morning and Evening Reports

on:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '10 12 * * 1-5'
  workflow_dispatch:
    inputs:
      report_type:
        description: Report type
        required: true
        default: morning
        type: choice
        options:
          - morning
          - evening

permissions:
  contents: write

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Select report type
        id: report
