name: Update DEV README Market Shared Architecture

on:
  push:
    paths:
      - '.github/workflows/update-dev-readme-market-shared.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update DEV-README
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('DEV-README.md')
          text = path.read_text(encoding='utf-8')

          intro_old = '> 用最少的阅读成本，快速理解 donew 这套工具系统，并且按现有风格继续开发，不乱改、不串层、不误推。\n'
          intro_new = intro_old + '\n这份文档是 **Codex 与 ChatGPT 共同读取的主开发说明**。两边接手 donew 任务时，都应先读本文件，再按任务类型补读对应目录的 README，避免不同智能体对仓库结构产生两套理解。\n'
          if intro_new not in text:
              if intro_old not in text:
                  raise SystemExit('intro marker missing')
              text = text.replace(intro_old, intro_new, 1)

          layer_old = '- `.github/workflows/generate-market-daily-reports.yml`\n- `scripts/generate-market-daily-report.mjs`\n- `lib/market-report-core.mjs`\n'
          layer_new = layer_old + '- `.github/workflows/verify-market-generation-paths.yml`\n'
          if layer_new not in text:
              if layer_old not in text:
                  raise SystemExit('automatic layer marker missing')
              text = text.replace(layer_old, layer_new, 1)

          market_old = '这是“多资产快照 + AI整理 + HTML/Markdown展示”的代表模板。\n'
          market_new = market_old + '''\n#### 市场报告的双入口共用关系\n\n“最新每日 / 每周市场情况分析”和“日报 / 晚报自动生成器”不是两套互不相关的工具，而是 **同一套市场判断思路，在两个执行位置使用**：\n\n```text\n同一套策略基线 / 市场判断原则 / 风险字段\n  ├── 网页手工生成：market-analysis-tool.html -> /api/market-report-v2\n  └── 自动生成：GitHub Actions -> scripts/generate-market-daily-report.mjs\n```\n\n两条链路的职责不同：\n\n- 网页手工生成：用户即时点击，生成每日 / 每周市场分析，重点是交互与即时展示。\n- 自动生成：按计划运行，生成早报 / 晚报并写入 `docs/市场/`，重点是稳定落地和历史记录。\n\n开发要求：\n\n- 两条链路应共享同一套核心判断思路、关键字段和策略口径。\n- 可以有不同的执行入口和输出格式，但不能出现相互矛盾的市场结论标准。\n- 修改市场报告规则、风险列、黑天鹅判断、卖 Put 动作约束时，必须同时检查手工与自动两条链路。\n- 使用 `.github/workflows/verify-market-generation-paths.yml` 做双链路结构校验，避免只修好网页或只修好自动生成。\n- 不要让网页 API 依赖一个看似废弃的 `_old` 文件；正式入口应保持依赖关系清晰、可独立部署。\n'''
          if '#### 市场报告的双入口共用关系' not in text:
              if market_old not in text:
                  raise SystemExit('market section marker missing')
              text = text.replace(market_old, market_new, 1)

          convention_old = '如果一个功能同时有根目录页面和 `kline_robot_vercel/` 页面：\n\n1. 先确认线上实际走的是哪一份\n2. 如需保持一致，成对修改\n3. 页面改动后，记得更新可见版本号，方便确认前端是否真的刷新\n'
          convention_new = convention_old + '''\n\n如果一个市场报告规则同时用于网页手工生成和日报 / 晚报自动生成：\n\n1. 先确认两条真实调用链。\n2. 同步检查策略字段、风险列和输出口径。\n3. 分别验证网页手工生成与 GitHub Actions 自动生成。\n4. 任何一条链路失败，都不能视为任务完成。\n'''
          if '如果一个市场报告规则同时用于网页手工生成' not in text:
              if convention_old not in text:
                  raise SystemExit('convention marker missing')
              text = text.replace(convention_old, convention_new, 1)

          path.write_text(text, encoding='utf-8')
          Path('.github/workflows/update-dev-readme-market-shared.yml').unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add DEV-README.md .github/workflows/update-dev-readme-market-shared.yml
          git commit -m 'docs: document shared market report architecture'
          git pull --rebase origin main
          git push origin HEAD:main
