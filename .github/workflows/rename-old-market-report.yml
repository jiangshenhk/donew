name: Rename old market report endpoint

on:
  push:
    paths:
      - '.github/workflows/rename-old-market-report.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Rename legacy endpoint
        run: |
          set -e
          old='kline_robot_vercel/api/market-report.js'
          archived='kline_robot_vercel/api/market-report_old.js'
          if [ ! -f "$old" ]; then
            echo "Legacy endpoint not found: $old" >&2
            exit 1
          fi
          if [ -e "$archived" ]; then
            echo "Archive target already exists: $archived" >&2
            exit 1
          fi
          git mv "$old" "$archived"

          python - <<'PY'
          import json
          from pathlib import Path

          config = Path('kline_robot_vercel/vercel.json')
          data = json.loads(config.read_text(encoding='utf-8'))
          functions = data.get('functions', {})
          old_key = 'api/market-report.js'
          new_key = 'api/market-report_old.js'
          if old_key in functions:
              functions[new_key] = functions.pop(old_key)
          config.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          git rm .github/workflows/rename-old-market-report.yml

      - name: Commit rename
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor: archive legacy market report endpoint as _old'
          git pull --rebase origin main
          git push origin HEAD:main
