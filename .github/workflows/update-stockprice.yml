name: Update Stock Price Cache

on:
  schedule:
    # 与金十新闻任务错峰，减少定时任务同时排队和提交冲突
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-stockprice
  cancel-in-progress: false

jobs:
  update-price:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Check price service switch
        id: switch
        run: |
          ENABLED=$(node --input-type=module -e "import fs from 'fs'; console.log(JSON.parse(fs.readFileSync('./stockprice/config/price-config.json','utf8')).enabled)")
          echo "enabled=$ENABLED" >> $GITHUB_OUTPUT
          echo "Price service enabled: $ENABLED"

      - name: Setup Node
        if: steps.switch.outputs.enabled == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Update market data
        if: steps.switch.outputs.enabled == 'true'
        run: node stockprice/scripts/update-price.js

      - name: Commit cache
        if: steps.switch.outputs.enabled == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add stockprice/data/latest-price.json
          if git diff --cached --quiet; then
            echo 'No price changes'
            exit 0
          fi
          git commit -m 'Update stock price cache'
          git pull --rebase origin main
          git push

      - name: Skip message
        if: steps.switch.outputs.enabled != 'true'
        run: echo 'Stock price updater disabled'
