name: Apply Market Report V2 Endpoint

on:
  push:
    paths:
      - '.github/workflows/apply-market-v2-endpoint.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Update endpoint and version
        run: |
          python - <<'PY'
          from pathlib import Path

          paths = [Path('market-analysis-tool.html'), Path('kline_robot_vercel/market-analysis-tool.html')]
          old_endpoint = '/api/market-report?kind='
          new_endpoint = '/api/market-report-v2?kind='
          old_version = 'v2.2.43｜2026-07-18｜统一自动与手工市场报告生成逻辑'
          new_version = 'v2.2.44｜2026-07-18｜强制大跌风险与黑天鹅矩阵列'

          for path in paths:
              text = path.read_text(encoding='utf-8')
              if old_endpoint not in text and new_endpoint not in text:
                  raise SystemExit(f'endpoint marker missing: {path}')
              text = text.replace(old_endpoint, new_endpoint)
              text = text.replace(old_version, new_version)
              path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/apply-market-v2-endpoint.yml')
          workflow.unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add market-analysis-tool.html kline_robot_vercel/market-analysis-tool.html .github/workflows/apply-market-v2-endpoint.yml
          git commit -m 'fix: deploy enforced risk columns to manual market tool'
          git pull --rebase origin main
          git push origin HEAD:main
