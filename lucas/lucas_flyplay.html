<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sky Fighters 🛩️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a0a1a;font-family:Arial,sans-serif;user-select:none}
#gameCanvas{display:block;margin:0 auto;background:#0f1a2e}
#gameCanvas.running{cursor:none}

#ui{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;color:#fff
}
#score{position:absolute;top:16px;right:20px;font-size:20px;font-weight:bold;text-shadow:0 0 8px rgba(0,150,255,0.5)}
#lives{position:absolute;top:16px;left:20px;font-size:18px}
#level{position:absolute;top:44px;right:20px;font-size:13px;color:#888}
#gameOver{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;display:none;pointer-events:auto
}
#gameOver h1{font-size:48px;color:#f44;text-shadow:0 0 20px rgba(255,0,0,0.5)}
#gameOver p{font-size:18px;color:#aaa;margin:12px 0 8px}
#highScore{font-size:14px;color:#ffd600;margin-bottom:20px}
#version{position:absolute;bottom:8px;right:12px;font-size:11px;color:#fff;pointer-events:none;font-family:Arial,sans-serif;opacity:0.6}
#gameOver button{
  padding:12px 36px;font-size:18px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;
  cursor:pointer;pointer-events:auto;font-weight:bold
}
#gameOver button:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af)}

#startScreen{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:#fff
}
#startScreen h1{font-size:52px;margin-bottom:8px;text-shadow:0 0 20px rgba(0,150,255,0.3)}
#startScreen .sub{font-size:15px;color:#888;margin-bottom:30px}
#startScreen button{
  padding:14px 48px;font-size:20px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;
  cursor:pointer;font-weight:bold
}
#startScreen button:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af)}
#startScreen .controls{font-size:13px;color:#666;margin-top:24px;line-height:1.8}
.diff-select{display:flex;gap:10px;justify-content:center;margin:16px 0}
.diff-btn{
  width:76px;height:68px;border:2px solid #555;border-radius:10px;
  background:rgba(255,255,255,0.06);color:#aaa;font-size:13px;font-weight:700;
  cursor:pointer;font-family:inherit;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;transition:all 0.15s
}
.diff-btn .mult{font-size:10px;font-weight:400;opacity:0.5}
.diff-btn:hover{border-color:#aaa;color:#fff;background:rgba(255,255,255,0.12)}
.diff-btn.active{border-color:#ffd600;background:#ffd600;color:#1a1a2e;box-shadow:0 0 14px rgba(255,215,0,0.5)}
.diff-btn.active .mult{opacity:0.8}
#startScreen .controls span{color:#888}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="lives">❤️❤️❤️</div>
  <div id="score">0</div>
  <div id="level">LEVEL 1</div>
  <div id="weapon" style="position:absolute;top:66px;right:20px;font-size:13px;color:#ffd600">WPN ★</div>

  <div id="startScreen">
    <h1>🛩️ Sky Fighters</h1>
    <div class="sub">Shoot 'em up!</div>
    <div class="diff-select">
      <button class="diff-btn active" data-mult="1">Easy<span class="mult">1×</span></button>
      <button class="diff-btn" data-mult="3">Medium<span class="mult">3×</span></button>
      <button class="diff-btn" data-mult="5">Hard<span class="mult">5×</span></button>
    </div>
    <div id="startHighScore" style="font-size:15px;color:#ffd600;margin-bottom:16px">🏆 Best: 0</div>
    <button id="startBtn">Start Game</button>
    <div class="controls">
      <span>Mouse / Touch</span> Move · Auto-fire enabled<br>
      Shoot enemies to score, avoid collisions
    </div>
  </div>

  <div id="gameOver">
    <h1>💥 GAME OVER</h1>
    <p id="finalScore">Score: 0</p>
    <div id="highScore">🏆 Best: 0</div>
    <button id="restartBtn">Play Again</button>
  </div>
  <div id="version">VER 1.0.4</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas')
const ctx = canvas.getContext('2d')

let highScore = parseInt(localStorage.getItem('flyplay_highscore') || '0')

function updateHighScoreDisplay() {
  document.getElementById('highScore').textContent = '🏆 Best: ' + highScore
  document.getElementById('startHighScore').textContent = '🏆 Best: ' + highScore
}
updateHighScoreDisplay()

let scale = 1

function resize() {
  canvas.width = window.innerWidth
  canvas.height = window.innerHeight
  scale = Math.min(canvas.width / 420, canvas.height / 750)
}
resize()
window.addEventListener('resize', () => {
  resize()
  if (game.running) {
    game.player.x = Math.max(game.player.w * scale / 2, Math.min(canvas.width - game.player.w * scale / 2, game.player.x))
    game.player.y = Math.max(game.player.h * scale / 2, Math.min(canvas.height - game.player.h * scale / 2, game.player.y))
  }
})

// --- Game state ---
const game = {
  player: { x: 0, y: 0, w: 36, h: 36 },
  bullets: [],
  enemyBullets: [],
  enemies: [],
  explosions: [],
  stars: [],
  score: 0,
  lives: 3,
  running: false,
  over: false,
  frame: 0,
  fireTimer: 0,
  fireRate: 12,
  mouseX: canvas.width / 2,
  mouseY: canvas.height - 100,
  shooting: true,
  weaponLevel: 0,
  powerups: [],
  powerupTimer: 0,
  elapsed: 0,
  difficultyMult: 1,
  threatLevel: 0,
}

// --- Stars background ---
for (let i = 0; i < 120; i++) {
  game.stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: 0.5 + Math.random() * 1.5,
    b: 0.3 + Math.random() * 0.7,
  })
}

// --- Player plane ---
function drawPlayer(x, y, w, h) {
  ctx.save()
  ctx.translate(x, y)
  ctx.scale(scale, scale)
  const hw = w / 2, hh = h / 2

  // Engine flame
  const flameLen = 6 + Math.sin(game.frame * 0.3) * 4
  ctx.fillStyle = `rgba(255,200,50,${0.5 + Math.sin(game.frame * 0.3) * 0.3})`
  ctx.beginPath()
  ctx.moveTo(-5, hh - 2)
  ctx.lineTo(0, hh + flameLen)
  ctx.lineTo(5, hh - 2)
  ctx.fill()
  ctx.fillStyle = `rgba(255,100,0,${0.3 + Math.sin(game.frame * 0.3 + 1) * 0.2})`
  ctx.beginPath()
  ctx.moveTo(-3, hh - 2)
  ctx.lineTo(0, hh + flameLen * 0.7)
  ctx.lineTo(3, hh - 2)
  ctx.fill()

  // Main wings
  ctx.fillStyle = '#1a73e8'
  ctx.beginPath()
  ctx.moveTo(-hw * 1.05, hh * 0.05)
  ctx.lineTo(-hw * 1.4, hh * 0.65)
  ctx.lineTo(-hw * 0.6, hh * 0.35)
  ctx.lineTo(-hw * 0.3, hh * 0.2)
  ctx.closePath()
  ctx.fill()
  ctx.beginPath()
  ctx.moveTo(hw * 1.05, hh * 0.05)
  ctx.lineTo(hw * 1.4, hh * 0.65)
  ctx.lineTo(hw * 0.6, hh * 0.35)
  ctx.lineTo(hw * 0.3, hh * 0.2)
  ctx.closePath()
  ctx.fill()

  // Fuselage
  ctx.fillStyle = '#42a5f5'
  ctx.beginPath()
  ctx.moveTo(0, -hh)
  ctx.quadraticCurveTo(hw * 0.3, -hh * 0.3, hw * 0.4, hh * 0.3)
  ctx.quadraticCurveTo(hw * 0.25, hh * 0.6, 0, hh * 0.85)
  ctx.quadraticCurveTo(-hw * 0.25, hh * 0.6, -hw * 0.4, hh * 0.3)
  ctx.quadraticCurveTo(-hw * 0.3, -hh * 0.3, 0, -hh)
  ctx.closePath()
  ctx.fill()

  // Fuselage highlight
  ctx.fillStyle = 'rgba(255,255,255,0.2)'
  ctx.beginPath()
  ctx.moveTo(-2, -hh * 0.7)
  ctx.quadraticCurveTo(-hw * 0.15, -hh * 0.15, -hw * 0.15, hh * 0.2)
  ctx.quadraticCurveTo(-hw * 0.08, hh * 0.4, 0, hh * 0.5)
  ctx.quadraticCurveTo(hw * 0.08, hh * 0.4, hw * 0.15, hh * 0.2)
  ctx.quadraticCurveTo(hw * 0.15, -hh * 0.15, 2, -hh * 0.7)
  ctx.closePath()
  ctx.fill()

  // Cockpit
  ctx.fillStyle = '#81d4fa'
  ctx.beginPath()
  ctx.ellipse(0, -hh * 0.25, hw * 0.2, hh * 0.2, 0, 0, Math.PI * 2)
  ctx.fill()
  ctx.fillStyle = 'rgba(255,255,255,0.4)'
  ctx.beginPath()
  ctx.ellipse(-2, -hh * 0.3, hw * 0.07, hh * 0.08, 0, 0, Math.PI * 2)
  ctx.fill()

  // Tail
  ctx.fillStyle = '#1565c0'
  ctx.beginPath()
  ctx.moveTo(0, -hh * 0.5)
  ctx.lineTo(-hw * 0.25, -hh * 0.8)
  ctx.lineTo(-hw * 0.1, -hh * 0.85)
  ctx.lineTo(0, -hh * 0.6)
  ctx.lineTo(hw * 0.1, -hh * 0.85)
  ctx.lineTo(hw * 0.25, -hh * 0.8)
  ctx.closePath()
  ctx.fill()

  ctx.restore()
}

// --- Enemy plane ---
function drawEnemy(e) {
  ctx.save()
  ctx.translate(e.x, e.y)
  ctx.scale(scale, scale)
  const rot = e.rot || 0
  ctx.rotate(rot)

  const w = e.w, h = e.h, hw = w / 2, hh = h / 2
  const bodyColor = e.color
  const wingColor = e.wingColor
  const darkColor = e.strokeColor

  // Engine glow (enemies fly downward, flame at top)
  ctx.fillStyle = `rgba(255,100,0,${0.3 + Math.sin(game.frame * 0.2 + e.wobble) * 0.2})`
  ctx.beginPath()
  ctx.moveTo(-3, -hh + 2)
  ctx.lineTo(0, -hh - 4 - Math.sin(game.frame * 0.2 + e.wobble) * 3)
  ctx.lineTo(3, -hh + 2)
  ctx.fill()

  // Left wing
  ctx.fillStyle = wingColor
  ctx.beginPath()
  ctx.moveTo(-hw * 0.9, -hh * 0.1)
  ctx.lineTo(-hw * 1.3, hh * 0.5)
  ctx.lineTo(-hw * 0.5, hh * 0.25)
  ctx.closePath()
  ctx.fill()

  // Right wing
  ctx.beginPath()
  ctx.moveTo(hw * 0.9, -hh * 0.1)
  ctx.lineTo(hw * 1.3, hh * 0.5)
  ctx.lineTo(hw * 0.5, hh * 0.25)
  ctx.closePath()
  ctx.fill()

  // Fuselage
  ctx.fillStyle = bodyColor
  ctx.beginPath()
  ctx.moveTo(0, hh)
  ctx.quadraticCurveTo(hw * 0.35, hh * 0.3, hw * 0.35, -hh * 0.2)
  ctx.quadraticCurveTo(hw * 0.2, -hh * 0.6, 0, -hh)
  ctx.quadraticCurveTo(-hw * 0.2, -hh * 0.6, -hw * 0.35, -hh * 0.2)
  ctx.quadraticCurveTo(-hw * 0.35, hh * 0.3, 0, hh)
  ctx.closePath()
  ctx.fill()

  // Fuselage highlight
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  ctx.beginPath()
  ctx.moveTo(-2, hh * 0.6)
  ctx.quadraticCurveTo(-hw * 0.12, hh * 0.1, -hw * 0.1, -hh * 0.3)
  ctx.quadraticCurveTo(0, -hh * 0.5, 2, -hh * 0.3)
  ctx.quadraticCurveTo(hw * 0.12, hh * 0.1, 2, hh * 0.6)
  ctx.closePath()
  ctx.fill()

  // Cockpit (enemy - dark glass)
  ctx.fillStyle = 'rgba(0,0,0,0.4)'
  ctx.beginPath()
  ctx.ellipse(0, -hh * 0.15, hw * 0.18, hh * 0.15, 0, 0, Math.PI * 2)
  ctx.fill()

  // Tail fin
  ctx.fillStyle = darkColor
  ctx.beginPath()
  ctx.moveTo(0, hh * 0.5)
  ctx.lineTo(-hw * 0.2, hh * 0.8)
  ctx.lineTo(-hw * 0.08, hh * 0.85)
  ctx.lineTo(0, hh * 0.6)
  ctx.lineTo(hw * 0.08, hh * 0.85)
  ctx.lineTo(hw * 0.2, hh * 0.8)
  ctx.closePath()
  ctx.fill()

  // HP bar
  if (e.maxHp > 1) {
    const barW = w * 0.7, barH = 3
    const bx = -barW / 2, by = -hh - 6
    ctx.fillStyle = 'rgba(0,0,0,0.5)'
    ctx.fillRect(bx, by, barW, barH)
    ctx.fillStyle = e.hp / e.maxHp > 0.3 ? '#4caf50' : '#f44336'
    ctx.fillRect(bx, by, barW * (e.hp / e.maxHp), barH)
  }

  ctx.restore()
}

// --- Explosion ---
function spawnExplosion(x, y, big) {
  for (let i = 0; i < (big ? 25 : 12); i++) {
    const angle = Math.random() * Math.PI * 2
    const speed = 30 + Math.random() * (big ? 80 : 40)
    game.explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * (big ? 30 : 15),
      maxLife: 20 + Math.random() * (big ? 30 : 15),
      size: 2 + Math.random() * (big ? 6 : 3),
      color: ['#ff6f00', '#ff8f00', '#ffab00', '#ffd600', '#fff'][Math.floor(Math.random() * 5)],
    })
  }
}

// --- Enemy config ---
const ENEMY_TYPES = {
  white:  { hp: 1,  w: 22, h: 22, speed: 55, score: 10, fireRate: 120, color: '#e0e0e0', wingColor: '#bdbdbd', strokeColor: '#9e9e9e' },
  green:  { hp: 2,  w: 26, h: 26, speed: 50, score: 20, fireRate: 120, color: '#66bb6a', wingColor: '#43a047', strokeColor: '#2e7d32' },
  blue:   { hp: 5,  w: 30, h: 30, speed: 45, score: 50, fireRate: 120, color: '#42a5f5', wingColor: '#1e88e5', strokeColor: '#1565c0' },
  red:    { hp: 10, w: 36, h: 36, speed: 40, score: 100, fireRate: 120, color: '#ef5350', wingColor: '#e53935', strokeColor: '#c62828' },
}

function spawnEnemyByType(type) {
  const cfg = ENEMY_TYPES[type]
  const x = 20 + Math.random() * (canvas.width - 40)
  const threatMult = 1 + game.threatLevel * 0.08
  const speedScale = Math.min(1, (scale + 0.5) / 1.5)
  game.enemies.push({
    x, y: -cfg.h,
    w: cfg.w, h: cfg.h,
    type,
    hp: cfg.hp,
    maxHp: cfg.hp,
    speed: (cfg.speed + Math.random() * 20) * threatMult * speedScale,
    rot: 0,
    wobble: Math.random() * 100,
    fireTimer: 0,
    fireRate: Math.max(30, Math.floor(cfg.fireRate / threatMult)),
    score: cfg.score,
    color: cfg.color,
    wingColor: cfg.wingColor,
    strokeColor: cfg.strokeColor,
  })
}

// --- Fire bullet ---
function fireBullet() {
  const count = game.weaponLevel + 1
  const spread = count <= 1 ? 0 : 0.04 + count * 0.02
  const startAngle = -spread * (count - 1) / 2
  const baseSpeed = 350 + Math.random() * 50
  const px = game.player.x
  const py = game.player.y - game.player.h / 2

  for (let i = 0; i < count; i++) {
    const angle = startAngle + spread * i
    game.bullets.push({
      x: px + (Math.random() - 0.5) * 4,
      y: py,
      vx: Math.sin(angle) * baseSpeed + (Math.random() - 0.5) * 10,
      vy: -Math.cos(angle) * baseSpeed,
      w: 3,
      h: 10,
    })
  }
}

// --- Init player ---
function initPlayer() {
  game.player.x = canvas.width / 2
  game.player.y = canvas.height - 80
}

// --- Reset game ---
function resetGame() {
  game.bullets = []
  game.enemyBullets = []
  game.enemies = []
  game.explosions = []
  game.powerups = []
  game.score = 0
  game.lives = 3
  game.level = 1
  game.over = false
  game.running = true
  game.frame = 0
  game.fireTimer = 0
  game.weaponLevel = 0
  game.powerupTimer = 0
  game.elapsed = 0
  game.threatLevel = 0
  game._lastWhiteSpawn = -1
  game._lastGreenSpawn = -1
  game._lastBlueSpawn = -1
  game._lastRedSpawn = -1
  canvas.classList.add('running')
  initPlayer()
  document.getElementById('startScreen').style.display = 'none'
  document.getElementById('gameOver').style.display = 'none'
  document.getElementById('score').textContent = '0'
  document.getElementById('lives').textContent = '❤️❤️❤️'
  document.getElementById('level').textContent = 'LEVEL 1'
  document.getElementById('weapon').textContent = 'WPN ★☆☆☆☆☆☆☆☆☆'
}

// --- Update ---
function update(dt) {
  if (!game.running || game.over) return
  game.frame++

  // Player position (follow mouse, clamped)
  game.player.x += (game.mouseX - game.player.x) * 0.15
  game.player.y += (game.mouseY - game.player.y) * 0.15
  game.player.x = Math.max(game.player.w / 2, Math.min(canvas.width - game.player.w / 2, game.player.x))
  game.player.y = Math.max(game.player.h / 2, Math.min(canvas.height - game.player.h / 2, game.player.y))

  // Shooting
  if (game.shooting) {
    game.fireTimer++
    if (game.fireTimer >= game.fireRate) {
      fireBullet()
      game.fireTimer = 0
    }
  } else {
    game.fireTimer = game.fireRate - 3
  }

  // --- Player bullets ---
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i]
    b.x += b.vx * dt
    b.y += b.vy * dt
    if (b.y < -20 || b.x < -20 || b.x > canvas.width + 20) {
      game.bullets.splice(i, 1)
    }
  }

  // --- Time-based enemy spawning ---
  game.elapsed += dt
  const sec = Math.floor(game.elapsed)
  if (sec > 0) {
    const screenPenalty = Math.min(0.4, (1 - scale) * 0.6)
    const skipChance = Math.max(0, screenPenalty)
    const mult = game.difficultyMult
    if (sec % 1 === 0 && sec !== game._lastWhiteSpawn) {
      game._lastWhiteSpawn = sec
      if (Math.random() >= skipChance) {
        const count = 1 + Math.floor(Math.random() * mult)
        for (let n = 0; n < count; n++) spawnEnemyByType('white')
      }
    }
    if (sec % 3 === 0 && sec !== game._lastGreenSpawn) {
      game._lastGreenSpawn = sec
      if (Math.random() >= skipChance) {
        const count = 1 + Math.floor(Math.random() * mult)
        for (let n = 0; n < count; n++) spawnEnemyByType('green')
      }
    }
    if (sec % 10 === 0 && sec !== game._lastBlueSpawn) {
      game._lastBlueSpawn = sec
      if (Math.random() >= skipChance) {
        const count = 1 + Math.floor(Math.random() * mult)
        for (let n = 0; n < count; n++) spawnEnemyByType('blue')
      }
    }
    if (sec % 20 === 0 && sec !== game._lastRedSpawn) {
      game._lastRedSpawn = sec
      if (Math.random() >= skipChance) {
        const count = 1 + Math.floor(Math.random() * mult)
        for (let n = 0; n < count; n++) spawnEnemyByType('red')
      }
    }
  }

  // Threat escalates every 30s: speed + fire rate increase
  const newThreat = Math.floor(game.elapsed / 30)
  if (newThreat !== game.threatLevel) {
    game.threatLevel = newThreat
  }

  // Level by elapsed time
  const newLevel = Math.floor(game.elapsed / 15) + 1
  if (newLevel !== game.level) {
    game.level = newLevel
    document.getElementById('level').textContent = 'LEVEL ' + game.level + (game.threatLevel > 0 ? ' ⚡+' + game.threatLevel : '')
  }

  const stars = game.weaponLevel + 1
  document.getElementById('weapon').textContent = 'WPN ' + '★'.repeat(stars) + '☆'.repeat(10 - stars)

  // --- Enemies ---
  for (let i = game.enemies.length - 1; i >= 0; i--) {
    const e = game.enemies[i]
    e.y += e.speed * dt
    e.x += Math.sin(game.frame * 0.02 + e.wobble) * 15 * dt
    e.rot = Math.sin(game.frame * 0.03 + e.wobble) * 0.05

    // Enemy shooting
    e.fireTimer++
    if (e.fireTimer >= e.fireRate) {
      e.fireTimer = 0
      game.enemyBullets.push({
        x: e.x,
        y: e.y + e.h / 2,
        vx: (Math.random() - 0.5) * 30,
        vy: 120 + Math.random() * 40,
        w: 4, h: 6,
      })
    }

    // Player bullet collision
    const es = scale
    for (let j = game.bullets.length - 1; j >= 0; j--) {
      const b = game.bullets[j]
      if (b.x > e.x - e.w * es / 2 && b.x < e.x + e.w * es / 2 &&
          b.y > e.y - e.h * es / 2 && b.y < e.y + e.h * es / 2) {
        game.bullets.splice(j, 1)
        e.hp--
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, e.maxHp >= 5)
          game.score += e.score
          document.getElementById('score').textContent = game.score
          game.enemies.splice(i, 1)
        }
        break
      }
    }
    if (i >= game.enemies.length) continue

    // Player collision
    const dx = game.player.x - e.x
    const dy = game.player.y - e.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < game.player.w / 2 + e.w / 2 - 6) {
      spawnExplosion(game.player.x, game.player.y, true)
      game.lives--
      document.getElementById('lives').textContent = '❤️'.repeat(game.lives) + '🖤'.repeat(3 - game.lives)
      game.enemies.splice(i, 1)
      if (game.lives <= 0) {
        game.running = false
        game.over = true
        canvas.classList.remove('running')
        if (game.score > highScore) {
          highScore = game.score
          localStorage.setItem('flyplay_highscore', String(highScore))
          updateHighScoreDisplay()
        }
        document.getElementById('finalScore').textContent = 'Score: ' + game.score
        document.getElementById('gameOver').style.display = 'block'
        return
      }
      initPlayer()
    }

    // Off screen
    if (e.y > canvas.height + 50) {
      game.enemies.splice(i, 1)
    }
  }

  // --- Enemy bullets ---
  for (let i = game.enemyBullets.length - 1; i >= 0; i--) {
    const b = game.enemyBullets[i]
    b.x += b.vx * dt
    b.y += b.vy * dt

    // Hit player
    const dx = game.player.x - b.x
    const dy = game.player.y - b.y
    if (Math.abs(dx) < game.player.w / 2 + 4 && Math.abs(dy) < game.player.h / 2 + 4) {
      spawnExplosion(game.player.x, game.player.y, false)
      game.lives--
      document.getElementById('lives').textContent = '❤️'.repeat(game.lives) + '🖤'.repeat(3 - game.lives)
      game.enemyBullets.splice(i, 1)
      if (game.lives <= 0) {
        game.running = false
        game.over = true
        canvas.classList.remove('running')
        if (game.score > highScore) {
          highScore = game.score
          localStorage.setItem('flyplay_highscore', String(highScore))
          updateHighScoreDisplay()
        }
        document.getElementById('finalScore').textContent = 'Score: ' + game.score
        document.getElementById('gameOver').style.display = 'block'
        return
      }
      initPlayer()
      continue
    }

    if (b.y > canvas.height + 20 || b.x < -20 || b.x > canvas.width + 20) {
      game.enemyBullets.splice(i, 1)
    }
  }

  // --- Powerups ---
  game.powerupTimer++
  if (game.powerupTimer >= 300) {
    game.powerupTimer = 0
    game.powerups.push({
      x: 40 + Math.random() * (canvas.width - 80),
      y: -20,
      speed: 50 + Math.random() * 20,
      size: 14,
    })
  }

  for (let i = game.powerups.length - 1; i >= 0; i--) {
    const p = game.powerups[i]
    p.y += p.speed * dt

    const dx = game.player.x - p.x
    const dy = game.player.y - p.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < game.player.w / 2 + p.size) {
      game.weaponLevel = Math.min(9, game.weaponLevel + 1)
      spawnExplosion(p.x, p.y, false)
      game.powerups.splice(i, 1)
    }

    if (p.y > canvas.height + 30) {
      game.powerups.splice(i, 1)
    }
  }

  // --- Explosions ---
  for (let i = game.explosions.length - 1; i >= 0; i--) {
    const p = game.explosions[i]
    p.x += p.vx * dt
    p.y += p.vy * dt
    p.vy += 80 * dt
    p.life--
    if (p.life <= 0) {
      game.explosions.splice(i, 1)
    }
  }
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, '#0a1628')
  grad.addColorStop(0.5, '#0f1a2e')
  grad.addColorStop(1, '#162035')
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  // Stars
  game.stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.b * (0.6 + Math.sin(game.frame * 0.01 + s.x) * 0.3)})`
    ctx.beginPath()
    ctx.arc(s.x, (s.y + game.frame * 0.3 * s.s) % canvas.height, s.s, 0, Math.PI * 2)
    ctx.fill()
  })

  // Bullets
  ctx.save()
  ctx.scale(scale, scale)
  ctx.shadowColor = '#4fc3f7'
  ctx.shadowBlur = 8
  game.bullets.forEach(b => {
    ctx.fillStyle = '#4fc3f7'
    ctx.fillRect(b.x / scale - b.w / 2, b.y / scale - b.h / 2, b.w, b.h)
    ctx.fillStyle = '#b3e5fc'
    ctx.fillRect(b.x / scale - b.w / 2, b.y / scale - b.h / 2, b.w, b.h / 2)
  })
  ctx.shadowBlur = 0
  ctx.restore()

  // Enemy bullets
  ctx.save()
  ctx.scale(scale, scale)
  ctx.shadowColor = '#ff6f00'
  ctx.shadowBlur = 6
  game.enemyBullets.forEach(b => {
    ctx.fillStyle = '#ff8f00'
    ctx.fillRect(b.x / scale - b.w / 2, b.y / scale - b.h / 2, b.w, b.h)
    ctx.fillStyle = '#ffd600'
    ctx.fillRect(b.x / scale - b.w / 2, b.y / scale - b.h / 2, b.w * 0.6, b.h / 2)
  })
  ctx.shadowBlur = 0
  ctx.restore()

  // Powerups
  game.powerups.forEach(p => {
    const pulse = 0.7 + Math.sin(game.frame * 0.08 + p.x) * 0.3
    ctx.save()
    ctx.translate(p.x, p.y)
    ctx.scale(scale, scale)
    ctx.shadowColor = '#ffd600'
    ctx.shadowBlur = 15

    // Star shape
    ctx.fillStyle = '#ffd600'
    ctx.beginPath()
    for (let i = 0; i < 5; i++) {
      const a1 = (i * 2 * Math.PI / 5) - Math.PI / 2
      const a2 = a1 + Math.PI / 5
      const r = p.size * pulse
      const r2 = r * 0.4
      ctx.lineTo(Math.cos(a1) * r, Math.sin(a1) * r)
      ctx.lineTo(Math.cos(a2) * r2, Math.sin(a2) * r2)
    }
    ctx.closePath()
    ctx.fill()
    ctx.shadowBlur = 0

    // W letter
    ctx.fillStyle = '#1a1a2e'
    ctx.font = 'bold 10px Arial'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'middle'
    ctx.fillText('W', 0, 0)

    ctx.restore()
  })

  // Enemies
  game.enemies.forEach(drawEnemy)

  // Player
  if (!game.over) {
    drawPlayer(game.player.x, game.player.y, game.player.w, game.player.h)
  }

  // Explosions
  ctx.save()
  ctx.scale(scale, scale)
  game.explosions.forEach(p => {
    const alpha = p.life / p.maxLife
    ctx.globalAlpha = alpha
    ctx.fillStyle = p.color
    ctx.beginPath()
    ctx.arc(p.x / scale, p.y / scale, p.size * alpha, 0, Math.PI * 2)
    ctx.fill()
  })
  ctx.globalAlpha = 1
  ctx.restore()
}

// --- Game loop ---
let lastTime = 0
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05)
  lastTime = time
  if (game.running) update(dt)
  draw()
  requestAnimationFrame(loop)
}

// --- Input (move = follow pointer, auto-fire always on) ---
function pointerHandler(e) {
  const rect = canvas.getBoundingClientRect()
  const cx = e.clientX || (e.touches?.[0]?.clientX ?? game.mouseX)
  const cy = e.clientY || (e.touches?.[0]?.clientY ?? game.mouseY)
  game.mouseX = (cx - rect.left) * (canvas.width / rect.width)
  game.mouseY = (cy - rect.top) * (canvas.height / rect.height)
}

canvas.addEventListener('mousemove', pointerHandler)
canvas.addEventListener('touchstart', pointerHandler, { passive: true })
canvas.addEventListener('touchmove', pointerHandler, { passive: true })

// Keyboard
document.addEventListener('keydown', e => {
  if (!game.running && !game.over) {
    if (e.code === 'ArrowLeft' || e.code === 'ArrowRight') {
      e.preventDefault()
      const btns = document.querySelectorAll('.diff-btn')
      const active = document.querySelector('.diff-btn.active')
      let idx = 0
      btns.forEach((b, i) => { if (b === active) idx = i })
      idx = e.code === 'ArrowLeft' ? Math.max(0, idx - 1) : Math.min(btns.length - 1, idx + 1)
      btns.forEach(b => b.classList.remove('active'))
      btns[idx].classList.add('active')
      return
    }
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault()
      game.difficultyMult = parseInt(document.querySelector('.diff-btn.active')?.dataset.mult || '1')
      resetGame()
      return
    }
  }
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault()
    if (!game.running && game.over) {
      resetGame()
      return
    }
    if (!game.running && !game.over) {
      resetGame()
      return
    }
  }
})

// --- Start / Restart buttons ---
document.getElementById('startBtn').addEventListener('click', () => {
  game.difficultyMult = parseInt(document.querySelector('.diff-btn.active')?.dataset.mult || '1')
  resetGame()
})
document.getElementById('restartBtn').addEventListener('click', resetGame)

document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
  })
})

// --- Init ---
initPlayer()
loop(0)
</script>
</body>
</html>
