<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>航班实时跟踪 ✈</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body,#map{height:100%;width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

.info-panel{
  position:absolute;top:20px;right:20px;z-index:1000;
  background:rgba(0,0,0,0.75);color:#fff;
  padding:14px 20px;border-radius:12px;
  min-width:180px;backdrop-filter:blur(12px);
  pointer-events:none;user-select:none;
  box-shadow:0 4px 20px rgba(0,0,0,0.3)
}
.info-panel .count{font-size:32px;font-weight:700;color:#4fc3f7;margin:2px 0 4px}
.info-panel .label{color:#aaa;font-size:12px}
.info-panel .sub{color:#888;font-size:11px;margin-top:4px}
.info-panel .tag{display:inline-block;background:#ffa726;color:#000;font-size:9px;padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}

.bottom-bar{
  position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:1000;
  display:flex;gap:10px;align-items:center
}
.refresh-btn{
  background:rgba(0,0,0,0.75);color:#fff;border:none;
  padding:10px 22px;border-radius:8px;font-size:14px;cursor:pointer;
  backdrop-filter:blur(8px);font-family:inherit;
  transition:background 0.2s;white-space:nowrap
}
.refresh-btn:hover{background:rgba(0,0,0,0.92)}
.refresh-btn:disabled{opacity:0.4;cursor:not-allowed}

.legend{
  position:absolute;bottom:30px;left:20px;z-index:1000;
  background:rgba(0,0,0,0.75);color:#fff;padding:12px 16px;border-radius:10px;
  font-size:12px;backdrop-filter:blur(8px);line-height:1.8;min-width:120px
}
.legend-item{display:flex;align-items:center;gap:8px}
.legend-dot{width:10px;height:10px;border-radius:50%;display:inline-block}

.plane-marker{text-align:center;line-height:1;font-size:0}
.plane-marker .plane-emoji{display:block;font-size:22px;transition:transform 0.3s;filter:drop-shadow(0 1px 2px rgba(0,0,0,0.5))}
.plane-marker .alt-tag{
  display:block;font-size:9px;color:#fff;background:rgba(0,0,0,0.6);
  border-radius:4px;padding:0 4px;margin-top:-2px;white-space:nowrap;
  font-family:'Courier New',monospace
}

.popup-flight{font-size:13px;line-height:1.8;min-width:160px}
.popup-flight .callsign{font-size:18px;font-weight:700;color:#1565c0}
.popup-flight .info-row{display:flex;justify-content:space-between;gap:12px}
.popup-flight .info-row .val{font-weight:600;color:#333}
.popup-flight .info-row .lbl{color:#888}
</style>
</head>
<body>

<div id="map"></div>

<div class="info-panel" id="infoPanel">
  <div class="label">✈ 实时航班 <span class="tag">模拟</span></div>
  <div class="count" id="planeCount">0</div>
  <div class="sub" id="statusText">加载中...</div>
</div>

<div class="legend" id="legend">
  <div class="legend-item"><span class="legend-dot" style="background:#66bb6a"></span> 低空 &lt; 3000m</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ffa726"></span> 中空 3000-7000m</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ef5350"></span> 高空 &gt; 7000m</div>
  <div class="legend-item"><span class="legend-dot" style="background:#ce93d8"></span> 高度未知</div>
</div>

<div class="bottom-bar">
  <button class="refresh-btn" id="refreshBtn">⟳ 刷新</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MAP_CENTER = [-28, 134]
const MAP_ZOOM = 5
const REFRESH_INTERVAL = 3000
const PLANE_COUNT = 45

const ALT_LOW = 3000
const ALT_HIGH = 7000

const AIRLINES = [
  { code: 'QF', name: '澳洲航空', country: 'Australia' },
  { code: 'VA', name: '维珍澳洲', country: 'Australia' },
  { code: 'JQ', name: '捷星航空', country: 'Australia' },
  { code: 'ZL', name: '区域快线', country: 'Australia' },
  { code: 'TT', name: '虎航澳洲', country: 'Australia' },
  { code: 'NZ', name: '新西兰航空', country: 'New Zealand' },
  { code: 'SQ', name: '新加坡航空', country: 'Singapore' },
  { code: 'CX', name: '国泰航空', country: 'Hong Kong' },
  { code: 'EK', name: '阿联酋航空', country: 'UAE' },
  { code: 'QR', name: '卡塔尔航空', country: 'Qatar' },
  { code: 'MH', name: '马来西亚航空', country: 'Malaysia' },
  { code: 'GA', name: '印尼鹰航', country: 'Indonesia' },
  { code: 'PR', name: '菲律宾航空', country: 'Philippines' },
  { code: 'TR', name: '酷航', country: 'Singapore' },
  { code: 'D7', name: '全亚洲航空', country: 'Malaysia' },
  { code: 'LA', name: '南美航空', country: 'Chile' },
  { code: 'AA', name: '美国航空', country: 'United States' },
  { code: 'UA', name: '联合航空', country: 'United States' },
  { code: 'DL', name: '达美航空', country: 'United States' },
  { code: 'BA', name: '英国航空', country: 'United Kingdom' },
]

function rand(min, max) { return Math.random() * (max - min) + min }

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)] }

function makeIcao() {
  let s = ''
  for (let i = 0; i < 6; i++) s += '0123456789abcdef'[Math.floor(Math.random() * 16)]
  return s
}

function makeCallsign() {
  const al = pick(AIRLINES)
  const num = Math.floor(rand(100, 9999))
  return al.code + String(num).padStart(4, '0')
}

function genRoute() {
  const cities = [
    { name: 'Sydney', lat: -33.9, lng: 151.2 },
    { name: 'Melbourne', lat: -37.8, lng: 144.9 },
    { name: 'Brisbane', lat: -27.5, lng: 153.0 },
    { name: 'Perth', lat: -31.9, lng: 115.9 },
    { name: 'Adelaide', lat: -34.9, lng: 138.6 },
    { name: 'Gold Coast', lat: -28.0, lng: 153.4 },
    { name: 'Cairns', lat: -16.9, lng: 145.8 },
    { name: 'Darwin', lat: -12.5, lng: 130.8 },
    { name: 'Hobart', lat: -42.9, lng: 147.3 },
    { name: 'Canberra', lat: -35.3, lng: 149.1 },
    { name: 'Newcastle', lat: -32.9, lng: 151.8 },
    { name: 'Townsville', lat: -19.3, lng: 146.8 },
    { name: 'Alice Springs', lat: -23.7, lng: 133.9 },
    { name: 'Auckland', lat: -37.0, lng: 174.8 },
    { name: 'Christchurch', lat: -43.5, lng: 172.6 },
    { name: 'Wellington', lat: -41.3, lng: 174.8 },
    { name: 'Singapore', lat: 1.35, lng: 103.8 },
    { name: 'Bali', lat: -8.7, lng: 115.2 },
    { name: 'Tokyo', lat: 35.7, lng: 139.8 },
    { name: 'Los Angeles', lat: 34.0, lng: -118.2 },
  ]
  const from = pick(cities)
  let to = pick(cities)
  while (to === from) to = pick(cities)
  const alt = rand(2500, 11000)
  const speed = rand(700, 950)
  const dlat = to.lat - from.lat
  const dlng = to.lng - from.lng
  const heading = (Math.atan2(dlng, dlat) * 180 / Math.PI + 360) % 360
  const progress = rand(0.05, 0.95)
  return {
    from, to,
    lat: from.lat + dlat * progress,
    lng: from.lng + dlng * progress,
    alt, speed, heading,
    dlat, dlng, progress
  }
}

function createPlane() {
  const route = genRoute()
  const al = pick(AIRLINES)
  return {
    icao: makeIcao(),
    callsign: makeCallsign(),
    country: al.country,
    ...route
  }
}

let planes = []
for (let i = 0; i < PLANE_COUNT; i++) {
  planes.push(createPlane())
}

function updatePlanes() {
  planes = planes.map(p => {
    const step = rand(0.003, 0.012)
    let prog = p.progress + step
    if (prog >= 1) {
      return createPlane()
    }
    return {
      ...p,
      progress: prog,
      lat: p.from.lat + p.dlat * prog,
      lng: p.from.lng + p.dlng * prog,
      alt: p.alt + rand(-50, 50),
      speed: p.speed + rand(-10, 10),
    }
  })
}

function getColor(alt) {
  if (alt === null || alt === undefined) return '#ce93d8'
  if (alt < ALT_LOW) return '#66bb6a'
  if (alt < ALT_HIGH) return '#ffa726'
  return '#ef5350'
}

function mpsToKmh(mps) {
  if (mps === null || mps === undefined) return null
  return Math.round(mps * 3.6)
}

function formatAlt(m) {
  if (m === null || m === undefined) return '--'
  return m < 10000 ? Math.round(m) + ' m' : (m / 1000).toFixed(1) + ' km'
}

const map = L.map('map', {
  center: MAP_CENTER,
  zoom: MAP_ZOOM,
  zoomControl: true,
  attributionControl: true
})

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>'
}).addTo(map)

let markers = {}
let layerGroup = L.layerGroup().addTo(map)
let isRefreshing = false

function makeIcon(heading, alt) {
  const color = getColor(alt)
  const rot = heading !== null && heading !== undefined ? heading : 0
  return L.divIcon({
    className: 'plane-marker',
    html: `
      <span class="plane-emoji" style="transform:rotate(${rot}deg);color:${color}">✈</span>
      <span class="alt-tag">${alt !== null && alt !== undefined ? ((alt/1000).toFixed(1)+'km') : '?'}</span>
    `,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  })
}

function updateMap() {
  updatePlanes()
  const seen = new Set()

  planes.forEach(p => {
    if (!p.icao || p.lat === null || p.lng === null) return
    seen.add(p.icao)
    const state = [p.icao, p.callsign, p.country, null, null, p.lng, p.lat, p.alt, false, p.speed / 3.6, p.heading, null, null, null, null, false, 0, null]

    if (markers[p.icao]) {
      const m = markers[p.icao]
      m.setLatLng([p.lat, p.lng])
      m.setIcon(makeIcon(p.heading, p.alt))
    } else {
      const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.heading, p.alt) })
      m.bindPopup(buildPopup(state))
      m._alt = p.alt
      markers[p.icao] = m
      layerGroup.addLayer(m)
    }
  })

  Object.keys(markers).forEach(icao => {
    if (!seen.has(icao)) {
      layerGroup.removeLayer(markers[icao])
      delete markers[icao]
    }
  })

  document.getElementById('planeCount').textContent = seen.size
  document.getElementById('statusText').textContent = '更新于 ' + new Date().toLocaleTimeString()
}

function buildPopup(state) {
  const cs = state[1] || '--'
  const country = state[2] || '--'
  const alt = state[7]
  const vel = state[9]
  const track = state[10]
  const speed = mpsToKmh(vel)
  return `
    <div class="popup-flight">
      <div class="callsign">${cs}</div>
      <div class="info-row"><span class="lbl">国家</span><span class="val">${country}</span></div>
      <div class="info-row"><span class="lbl">高度</span><span class="val">${formatAlt(alt)}</span></div>
      <div class="info-row"><span class="lbl">速度</span><span class="val">${speed !== null ? speed + ' km/h' : '--'}</span></div>
      <div class="info-row"><span class="lbl">航向</span><span class="val">${track !== null ? track + '°' : '--'}</span></div>
    </div>
  `
}

function simulate() {
  if (isRefreshing) return
  isRefreshing = true
  const btn = document.getElementById('refreshBtn')
  btn.disabled = true
  btn.textContent = '⟳ 刷新中...'

  updateMap()

  isRefreshing = false
  btn.disabled = false
  btn.textContent = '⟳ 刷新'
}

document.getElementById('refreshBtn').addEventListener('click', simulate)

simulate()
setInterval(simulate, REFRESH_INTERVAL)
</script>
</body>
</html>
