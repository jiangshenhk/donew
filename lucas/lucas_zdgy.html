<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>深渊守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;justify-content:center;align-items:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ver">VER 2.10.0</div>
<style>
#ver{position:fixed;bottom:6px;right:10px;z-index:100;font:10px Arial,sans-serif;color:#fff;opacity:0.4;pointer-events:none}
</style>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const VW = 420, VH = 780;
let scale = 1;
let offX = 0, offY = 0;

function resize() {
  const r = VW / VH;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > r) { w = h * r } else { h = w / r }
  canvas.width = Math.round(w); canvas.height = Math.round(h);
  scale = canvas.width / VW;
  offX = (window.innerWidth - canvas.width) / 2; offY = (window.innerHeight - canvas.height) / 2;
  canvas.style.marginLeft = offX + 'px'; canvas.style.marginTop = offY + 'px';
}
resize();
window.addEventListener('resize', resize);

const GIFT_LANE = Math.round(VW * 0.5);
const ENEMY_LANE = VW - GIFT_LANE;

const MAX_GIFTS = 8;
const IW = 13, IH = 13;   // imp size
const IGX = 20, IGY = 18; // imp grid spacing

const state = {
  screen: 'menu', score: 0, frame: 0, lastShot: 0, lastDecay: 0,
  bulletCount: 1, damage: 1, playerSpeed: 4,
};

function pickUpgrade() {
  const opts = [];
  if (state.bulletCount < 8) opts.push({ type: 'bullet', label: '弹道' });
  if (state.damage < 5) opts.push({ type: 'damage', label: '威力' });
  if (state.playerSpeed < 9) opts.push({ type: 'speed', label: '速度' });
  if (opts.length === 0) {
    const fallback = [{ type: 'bullet', label: '弹道' }, { type: 'damage', label: '威力' }, { type: 'speed', label: '速度' }];
    const pick = fallback[Math.floor(Math.random() * 3)];
    return { type: pick.type, bonus: 0, label: '+' + 0 + pick.label };
  }
  const pick = opts[Math.floor(Math.random() * opts.length)];
  const max = pick.type === 'bullet' ? 8 : pick.type === 'damage' ? 5 : 9;
  const cur = pick.type === 'bullet' ? state.bulletCount : pick.type === 'damage' ? state.damage : state.playerSpeed;
  let bonus = Math.random() < 0.5 ? 1 : 2;
  if (cur + bonus > max) bonus = Math.max(1, max - cur);
  return { type: pick.type, bonus, label: '+' + bonus + pick.label };
}

const player = { x: VW / 2, y: VH - 42, w: 28, h: 32 };
const keys = { left: false, right: false };
let mouseX = null, mouseActive = false;

let gifts = [], bullets = [], squads = [], doors = [], particles = [];

function giftY(i) { return 55 + i * 34; }

function makeGift() {
  const w = GIFT_LANE * 0.7;
  const upg = pickUpgrade();
  const hp = 3 + Math.floor(Math.random() * 3);
  return { x: GIFT_LANE / 2 - w / 2, y: 0, targetY: 0, w, h: 40, hp, maxHp: hp, scale: 1, targetScale: 1, ...upg };
}

function repositionGifts() {
  for (let i = 0; i < gifts.length; i++) {
    gifts[i].targetY = giftY(i);
    gifts[i].targetScale = i === gifts.length - 1 ? 1.5 : 1;
  }
}

function emit(x, y, n, color, spd, life) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * spd;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: life||30, maxLife: life||30, color, size: 1.5+Math.random()*3 });
  }
}

function spawnDoor() {
  const dw = 7 * IW, dh = 2 * IH;
  const x = GIFT_LANE + (ENEMY_LANE - dw) / 2;
  const hp = 200 + state.frame * 0.25;
  const spd = 0.3 + state.frame * 0.00003;
  doors.push({ x, y: -dh - 50, w: dw, h: dh, hp, maxHp: hp, spd });
}

function spawnSquad() {
  const cols = 7, rows = 5 + Math.floor(Math.random() * 3);
  const tw = cols * IGX;
  const sx = GIFT_LANE + (ENEMY_LANE - tw) / 2 + IGX / 2;
  const spd = 0.35 + state.frame * 0.00003;
  const hp = 80 + state.frame * 0.12;
  const ey = -55;

  const imps = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      imps.push({ x: sx + c * IGX, y: ey + 50 + r * IGY, w: IW, h: IH, hp: 1, spd });

  const demon = { x: sx + (tw) / 2 - 28, y: ey - 55, w: 56, h: 52, hp, maxHp: hp, spd };
  squads.push({ imps, demon });
}

function shoot() {
  const now = Date.now();
  const rate = Math.max(200, 280 - state.bulletCount * 6);
  if (now - state.lastShot < rate) return;
  state.lastShot = now;
  const bx = player.x, by = player.y - player.h / 2;
  const bspd = 11, bw = 3, bh = 10;
  const cnt = state.bulletCount, spread = Math.min(8, cnt);
  const dmg = state.damage, aoe = dmg >= 3 ? 20 + dmg * 6 : 0;
  if (cnt === 1) {
    bullets.push({ x: bx - bw / 2, y: by, w: bw, h: bh, vy: -bspd, dmg, aoe });
  } else {
    const half = (cnt - 1) / 2;
    for (let i = 0; i < cnt; i++) {
      const off = (i - half) * spread;
      bullets.push({ x: bx + off - bw / 2, y: by, w: bw, h: bh, vy: -bspd + Math.abs(off) * 0.12, dmg, aoe });
    }
  }
}

function aabb(a, b) { return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y; }

function consumeStats(amount) {
  let n = amount;
  while (n > 0 && state.damage > 1) { state.damage--; n--; }
  while (n > 0 && state.playerSpeed > 4) { state.playerSpeed--; n--; }
  while (n > 0 && state.bulletCount > 1) { state.bulletCount--; n--; }
  if (n < amount) emit(VW / 2, VH - 100, 30, '#ffd700', 5, 30);
  return n === 0;
}

function update() {
  if (state.screen !== 'playing') return;
  state.frame++;

  if (state.frame % 180 === 0 && gifts.length < MAX_GIFTS) { gifts.unshift(makeGift()); repositionGifts(); }
  if (state.frame === 60 || state.frame % 360 === 0) spawnSquad();
  if (state.frame > 120 && (state.frame - 240) % 720 === 0) spawnDoor();
  if (state.frame - state.lastDecay >= 600 && state.frame > 120) {
    state.lastDecay = state.frame;
    if (state.damage > 1) state.damage--;
    else if (state.playerSpeed > 4) state.playerSpeed--;
    else if (state.bulletCount > 1) state.bulletCount--;
  }

  if (keys.left) { player.x -= state.playerSpeed; mouseActive = false; }
  if (keys.right) { player.x += state.playerSpeed; mouseActive = false; }
  if (mouseActive && mouseX !== null) player.x += (mouseX - player.x) * 0.18;
  player.x = Math.max(player.w / 2, Math.min(VW - player.w / 2, player.x));

  shoot();

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy;
    if (b.y + b.h < 0 || b.y > VH) { bullets.splice(i, 1); continue; }
    let hit = false;

    if (b.x < GIFT_LANE) {
      for (const g of gifts) {
        if (aabb(b, g)) {
          g.hp--;
          emit(b.x + b.w / 2, b.y, 2, '#7ec8e3', 2, 10);
          if (g.hp <= 0) {
            if (g.bonus > 0) {
              if (g.type === 'bullet') state.bulletCount = Math.min(8, state.bulletCount + g.bonus);
              else if (g.type === 'damage') state.damage = Math.min(5, state.damage + g.bonus);
              else if (g.type === 'speed') state.playerSpeed = Math.min(9, state.playerSpeed + g.bonus);
            } else state.score += 50;
            state.lastDecay = state.frame;
            emit(g.x + g.w / 2, g.y + g.h / 2, 25, '#00d2ff', 4, 30);
            gifts.splice(gifts.indexOf(g), 1);
            gifts.unshift(makeGift());
            repositionGifts();
          }
          hit = true; break;
        }
      }
    }

    if (!hit && b.x + b.w > GIFT_LANE) {
      for (const sq of squads) {
        for (let j = sq.imps.length - 1; j >= 0; j--) {
          if (aabb(b, sq.imps[j])) { sq.imps.splice(j, 1); state.score += 10; hit = true; break; }
        }
        if (hit) break;
        if (sq.demon.hp > 0 && aabb(b, sq.demon)) {
          sq.demon.hp -= b.dmg;
          emit(b.x + b.w / 2, b.y, 4, '#ff4757', 2, 14);
          if (b.aoe > 0) {
            emit(sq.demon.x + sq.demon.w / 2, sq.demon.y + sq.demon.h / 2, 8, '#ff6348', 3, 15);
            for (const sq2 of squads) {
              for (let k = sq2.imps.length - 1; k >= 0; k--) {
                const im = sq2.imps[k];
                if (Math.hypot(im.x+im.w/2 - (sq.demon.x+sq.demon.w/2), im.y+im.h/2 - (sq.demon.y+sq.demon.h/2)) < b.aoe)
                  { sq2.imps.splice(k, 1); state.score += 10; }
              }
              if (sq2.demon !== sq.demon) {
                const dx = sq2.demon.x+sq2.demon.w/2 - (sq.demon.x+sq.demon.w/2);
                const dy = sq2.demon.y+sq2.demon.h/2 - (sq.demon.y+sq.demon.h/2);
                if (Math.hypot(dx, dy) < b.aoe) sq2.demon.hp -= b.dmg * 0.5;
              }
            }
          }
          if (sq.demon.hp <= 0) { state.score += 100; emit(sq.demon.x + sq.demon.w / 2, sq.demon.y + sq.demon.h / 2, 45, '#ff4757', 6, 30); }
          hit = true; break;
        }
      }
    }

    if (!hit && b.x + b.w > GIFT_LANE) {
      for (const d of doors) {
        if (d.hp > 0 && aabb(b, d)) {
          d.hp -= b.dmg;
          emit(b.x + b.w / 2, b.y, 4, '#b388ff', 2, 14);
          if (d.hp <= 0) { state.score += 200; emit(d.x + d.w / 2, d.y + d.h / 2, 50, '#b388ff', 8, 35); }
          hit = true; break;
        }
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  for (let i = squads.length - 1; i >= 0; i--) {
    const sq = squads[i]; let alive = false;
    for (let j = sq.imps.length - 1; j >= 0; j--) {
      const imp = sq.imps[j]; imp.y += imp.spd; alive = true;
      if (imp.y + imp.h > VH - 20) {
        if (consumeStats(1)) { sq.imps.splice(j, 1); emit(imp.x + imp.w / 2, VH - 20, 15, '#ffd700', 4, 18); }
        else { state.screen = 'gameover'; return; }
      }
    }
    sq.demon.y += sq.demon.spd;
    if (sq.demon.hp > 0) alive = true;
    if (sq.demon.y + sq.demon.h > VH - 20 && sq.demon.hp > 0) {
      if (consumeStats(4)) { sq.demon.hp = 0; emit(sq.demon.x + sq.demon.w / 2, sq.demon.y + sq.demon.h / 2, 60, '#ffd700', 8, 35); }
      else { state.screen = 'gameover'; return; }
    }
    if (!alive) squads.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy;
    if (--p.life <= 0) particles.splice(i, 1);
  }

  for (let i = doors.length - 1; i >= 0; i--) {
    const d = doors[i]; d.y += d.spd;
    if (d.y + d.h > VH - 20 && d.hp > 0) {
      if (consumeStats(2)) { d.hp = 0; emit(d.x + d.w / 2, d.y + d.h / 2, 50, '#ffd700', 8, 30); }
      else { state.screen = 'gameover'; return; }
    }
    if (d.hp <= 0) doors.splice(i, 1);
  }

  for (const g of gifts) {
    g.y += (g.targetY - g.y) * 0.1;
    g.scale += (g.targetScale - g.scale) * 0.08;
  }
}

// ─── Draw ───────────────────────────────────────────────────────

function bg() {
  ctx.fillStyle = '#0a0a1a'; ctx.fillRect(0, 0, VW, VH);
  const grd = ctx.createLinearGradient(0, 0, GIFT_LANE, 0);
  grd.addColorStop(0, 'rgba(0,50,100,0.12)'); grd.addColorStop(1, 'rgba(0,50,100,0)');
  ctx.fillStyle = grd; ctx.fillRect(0, 0, GIFT_LANE, VH);
  ctx.strokeStyle = 'rgba(0,100,200,0.1)'; ctx.lineWidth = 1; ctx.setLineDash([3, 5]);
  ctx.beginPath(); ctx.moveTo(GIFT_LANE, 0); ctx.lineTo(GIFT_LANE, VH); ctx.stroke(); ctx.setLineDash([]);
  for (let i = 0; i < 20; i++) {
    const sx = (i * 137.5 + state.frame * 0.3) % VW;
    const sy = (i * 97.3 + state.frame * 0.15) % VH;
    ctx.fillStyle = `rgba(100,150,255,${0.05 + Math.sin(i * 2.7 + state.frame * 0.008) * 0.03})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
  }
}

function rRect(x, y, w, h, r) {
  ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath();
}

function drawGift(g, idx) {
  const pct = g.hp / g.maxHp;
  const isPrimary = idx === gifts.length - 1;
  ctx.save();
  const cx = g.x + g.w / 2, cy = g.y + g.h / 2;
  ctx.translate(cx, cy); ctx.scale(g.scale, g.scale); ctx.translate(-cx, -cy);
  const grd = ctx.createLinearGradient(g.x, g.y, g.x, g.y + g.h);
  grd.addColorStop(0, `rgba(80,170,255,${0.5 + pct * 0.4})`); grd.addColorStop(1, `rgba(40,90,200,${0.5 + pct * 0.4})`);
  ctx.fillStyle = grd; ctx.strokeStyle = `rgba(180,220,255,${pct * 0.6 + 0.2})`;
  ctx.lineWidth = isPrimary ? 2.5 : 1.5; rRect(g.x, g.y, g.w, g.h, 4); ctx.fill(); ctx.stroke();
  if (pct > 0.2) {
    ctx.fillStyle = `rgba(255,255,255,${pct * 0.3})`;
    for (let i = 0; i < (isPrimary ? 6 : 4); i++) {
      const ix = g.x + 6 + (i * 17 + 5) % (g.w - 12);
      const iy = g.y + 6 + (i * 13 + 7) % (g.h - 12);
      ctx.beginPath(); ctx.moveTo(ix, iy); ctx.lineTo(ix + 2.5, iy + 4); ctx.lineTo(ix - 2.5, iy + 4);
      ctx.closePath(); ctx.fill();
    }
  }
  const bw = g.w - 14, bh = 4;
  ctx.fillStyle = 'rgba(0,0,0,0.35)'; rRect(g.x + 7, g.y + g.h - 10, bw, bh, 2); ctx.fill();
  ctx.fillStyle = 'rgba(120,210,255,0.85)'; rRect(g.x + 7, g.y + g.h - 10, bw * (1 - pct), bh, 2); ctx.fill();
  ctx.fillStyle = `rgba(255,255,255,${1 - pct * 0.4})`;
  ctx.font = `bold ${isPrimary ? 16 : 12}px sans-serif`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('❄' + g.hp, g.x + g.w / 2, g.y + g.h / 2 - 3);
  if (g.label) {
    ctx.fillStyle = g.type === 'bullet' ? '#4fc3f7' : g.type === 'damage' ? '#ff6b6b' : '#69db7c';
    ctx.font = `bold ${isPrimary ? 14 : 11}px sans-serif`;
    ctx.fillText(g.label, g.x + g.w / 2, g.y + g.h / 2 + 13);
  }
  ctx.restore();
}

function drawDemon(d) {
  ctx.save();
  const grd = ctx.createRadialGradient(d.x + d.w / 2, d.y + d.h / 2, 5, d.x + d.w / 2, d.y + d.h / 2, d.w / 2);
  grd.addColorStop(0, '#8b0000'); grd.addColorStop(0.5, '#4a0000'); grd.addColorStop(1, '#1a0000');
  ctx.fillStyle = grd; rRect(d.x, d.y, d.w, d.h, 8); ctx.fill();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '28px sans-serif'; ctx.fillText('👹', d.x + d.w / 2, d.y + d.h / 2 + 2);
  const hpPct = d.hp / d.maxHp;
  const barY = d.y - 14, barH = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; rRect(d.x, barY, d.w, barH, 3); ctx.fill();
  ctx.fillStyle = hpPct > 0.3 ? '#ff4444' : '#ff0000'; rRect(d.x, barY, d.w * hpPct, barH, 3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(d.hp) + '/' + Math.ceil(d.maxHp), d.x + d.w / 2, barY + barH / 2);
  ctx.restore();
}

function drawDoor(d) {
  ctx.save();
  const hpPct = d.hp / d.maxHp;
  const grd = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.h);
  grd.addColorStop(0, '#7b1fa2'); grd.addColorStop(0.5, '#4a148c'); grd.addColorStop(1, '#2a0a5a');
  ctx.fillStyle = grd; rRect(d.x, d.y, d.w, d.h, 4); ctx.fill();
  ctx.strokeStyle = 'rgba(255,200,100,0.4)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(d.x + d.w / 2, d.y + 3); ctx.lineTo(d.x + d.w / 2, d.y + d.h - 3); ctx.stroke();
  const barY = d.y - 16, barH = 10;
  ctx.fillStyle = 'rgba(0,0,0,0.6)'; rRect(d.x, barY, d.w, barH, 3); ctx.fill();
  ctx.fillStyle = hpPct > 0.3 ? '#ff6b35' : '#ff0000'; rRect(d.x, barY, d.w * hpPct, barH, 3); ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(d.hp) + '/' + Math.ceil(d.maxHp), d.x + d.w / 2, barY + barH / 2);
  ctx.restore();
}

function drawImp(imp) {
  ctx.save();
  ctx.fillStyle = '#2d1b00';
  ctx.beginPath(); ctx.arc(imp.x + imp.w / 2, imp.y + imp.h / 2, imp.w / 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(imp.x + imp.w / 2, imp.y + imp.h / 2, 2.5, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#8b0000';
  ctx.beginPath();
  ctx.arc(imp.x + imp.w / 2 - 2, imp.y + imp.h / 2 - 2.5, 1.2, 0, Math.PI * 2);
  ctx.arc(imp.x + imp.w / 2 + 2, imp.y + imp.h / 2 - 2.5, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.fillStyle = '#1a1a2e';
  rRect(player.x - player.w / 2 + 2, player.y + 3, player.w - 4, player.h - 6, 4); ctx.fill();
  ctx.fillStyle = '#e2b631';
  ctx.beginPath(); ctx.arc(player.x, player.y - 3, player.w / 2 - 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(player.x - 4, player.y - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x + 4, player.y - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(player.x - 4, player.y - 6, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x + 4, player.y - 6, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e2b631';
  ctx.fillRect(player.x - 8, player.y, 2.5, 4); ctx.fillRect(player.x + 5.5, player.y, 2.5, 4);
  ctx.fillStyle = '#4fc3f7'; ctx.shadowColor = '#4fc3f7'; ctx.shadowBlur = 8;
  ctx.fillRect(player.x - 1, player.y - 12, 2, 9); ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#4fc3f7'; ctx.shadowColor = '#4fc3f7'; ctx.shadowBlur = 8;
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#b3e5fc'; ctx.fillRect(b.x, b.y, b.w, b.h * 0.5);
  ctx.shadowBlur = 0; ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  }
}

function drawBottomStatus() {
  if (state.frame < 60) return;
  const shield = (state.damage - 1) + (state.playerSpeed - 4) + (state.bulletCount - 1);
  const elapsed = state.frame - state.lastDecay;
  const secs = Math.ceil(Math.max(0, 600 - elapsed) / 60);
  const pct = Math.min(elapsed / 600, 1);
  const cx = GIFT_LANE / 2, sy = VH - 170;

  ctx.save();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px sans-serif';
  ctx.fillText('⭐' + state.score, cx, sy);

  ctx.fillStyle = '#4fc3f7';
  ctx.font = 'bold 16px sans-serif';
  ctx.fillText('🔫' + state.bulletCount + '  💥' + state.damage + '  ⚡' + state.playerSpeed, cx, sy + 32);

  ctx.fillStyle = '#ffd700';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText('🛡️' + shield, cx, sy + 60);

  const barW = GIFT_LANE * 0.55, barH = 8, barX = (GIFT_LANE - barW) / 2, barY = sy + 80;
  ctx.fillStyle = 'rgba(255,255,255,0.1)'; rRect(barX, barY, barW, barH, 3); ctx.fill();
  ctx.fillStyle = 'rgba(255,100,100,0.6)'; rRect(barX, barY, barW * (1 - pct), barH, 3); ctx.fill();
  ctx.fillStyle = '#ff6b6b';
  ctx.font = 'bold 12px sans-serif';
  ctx.fillText('⬇ 🔫💥 ' + secs + 's', cx, barY + barH + 14);

  ctx.restore();
}

function drawHUD() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, VW, 24);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textBaseline = 'middle';
  ctx.textAlign = 'left'; ctx.fillText('⭐' + state.score, 6, 12);
  ctx.textAlign = 'right'; ctx.fillStyle = '#888';
  ctx.fillText(Math.floor(state.frame / 60) + 's', VW - 6, 12);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(0, VH - 3, GIFT_LANE, 3);
  ctx.fillStyle = 'rgba(255,255,255,0.04)';
  ctx.fillRect(GIFT_LANE, VH - 3, ENEMY_LANE, 3);
  ctx.restore();
}

function render() {
  ctx.save(); ctx.scale(scale, scale); bg();

  if (state.screen === 'menu') {
    ctx.fillStyle = 'rgba(0,20,40,0.7)'; ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#00d2ff'; ctx.font = 'bold 32px sans-serif'; ctx.shadowColor = '#00d2ff'; ctx.shadowBlur = 20;
    ctx.fillText('深渊守护者', VW / 2, VH / 2 - 80); ctx.shadowBlur = 0;
    ctx.fillStyle = '#aaa'; ctx.font = '13px sans-serif';
    ctx.fillText('← → / A,D / 鼠标移动', VW / 2, VH / 2 - 35);
    ctx.font = '12px sans-serif'; ctx.fillText('打掉礼物重置倒计时，每10秒威力→速度→弹道', VW / 2, VH / 2 - 5);
    ctx.fillStyle = '#4fc3f7'; ctx.fillText('🔫弹道  💥威力(范围)  ⚡速度', VW / 2, VH / 2 + 22);
    ctx.font = '11px sans-serif'; ctx.fillStyle = '#666';
    ctx.fillText('到底消耗效果抵扣(小鬼1/恶魔4/门2)，不足则失败', VW / 2, VH / 2 + 52);
    ctx.fillStyle = '#00d2ff'; ctx.font = 'bold 16px sans-serif';
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.5;
    ctx.fillText('— 点击 / 按空格开始 —', VW / 2, VH / 2 + 85);
    ctx.restore(); return;
  }

  if (state.screen === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff4757'; ctx.font = 'bold 30px sans-serif'; ctx.shadowColor = '#ff4757'; ctx.shadowBlur = 20;
    ctx.fillText('游戏结束', VW / 2, VH / 2 - 75); ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff'; ctx.font = '20px sans-serif';
    ctx.fillText('得分: ' + state.score, VW / 2, VH / 2 - 20);
    ctx.fillStyle = '#aaa'; ctx.font = '14px sans-serif';
    ctx.fillText('存活 ' + Math.floor(state.frame / 60) + ' 秒', VW / 2, VH / 2 + 15);
    ctx.fillStyle = '#4fc3f7'; ctx.font = '15px sans-serif';
    ctx.fillText('🔫' + state.bulletCount + '弹道  💥' + state.damage + '威力  ⚡' + state.playerSpeed + '速度', VW / 2, VH / 2 + 50);
    ctx.fillStyle = '#00d2ff'; ctx.font = 'bold 16px sans-serif';
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.5;
    ctx.fillText('— 点击重新开始 —', VW / 2, VH / 2 + 100);
    ctx.restore(); return;
  }

  ctx.save(); ctx.beginPath(); ctx.rect(0, 0, GIFT_LANE, VH); ctx.clip();
  ctx.fillStyle = 'rgba(0,60,120,0.06)'; ctx.fillRect(0, 0, GIFT_LANE, VH);
  ctx.fillStyle = 'rgba(0,120,200,0.07)'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('— 礼物 —', GIFT_LANE / 2, 55);
  gifts.forEach((g, i) => { if (g.hp > 0) drawGift(g, i); });

  ctx.restore();

  ctx.save(); ctx.beginPath(); ctx.rect(GIFT_LANE, 0, ENEMY_LANE, VH); ctx.clip();
  for (const sq of squads) {
    for (const imp of sq.imps) drawImp(imp);
    if (sq.demon.hp > 0) drawDemon(sq.demon);
  }
  for (const d of doors) if (d.hp > 0) drawDoor(d);
  ctx.restore();

  drawParticles(); for (const b of bullets) drawBullet(b);
  drawPlayer(); drawHUD(); drawBottomStatus();
  ctx.restore();
}

function loop() { update(); render(); requestAnimationFrame(loop); }

function startGame() {
  state.score = 0; state.bulletCount = 1; state.damage = 1; state.playerSpeed = 4;
  state.frame = 0; state.lastDecay = 0; state.screen = 'playing';
  player.x = VW / 2;
  bullets = []; squads = []; doors = []; particles = []; gifts = [];
  for (let i = 0; i < 8; i++) { gifts.push(makeGift()); }
  repositionGifts();
}

function screenToVX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return ((clientX - rect.left) * (canvas.width / rect.width)) / scale;
}

canvas.addEventListener('click', () => { if (state.screen !== 'playing') startGame(); });
canvas.addEventListener('mousemove', e => {
  if (state.screen !== 'playing') return;
  mouseX = screenToVX(e.clientX); mouseActive = true;
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault(); const t = e.touches[0];
  if (state.screen !== 'playing') { startGame(); return; }
  mouseX = screenToVX(t.clientX); mouseActive = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault(); const t = e.touches[0];
  mouseX = screenToVX(t.clientX); mouseActive = true;
}, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (state.screen !== 'playing') startGame(); }
});
document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

loop();
</script>
</body>
</html>
