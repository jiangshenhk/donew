<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>登录｜十方斋</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-brand">
      <a href="/" class="auth-logo">十方斋</a>
      <p class="auth-sub">登录以使用全部功能</p>
    </div>

    <div id="auth-msg" class="auth-msg" style="display:none"></div>

    <button id="google-btn" class="btn btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" style="margin-right:8px;flex-shrink:0">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 登录
    </button>

    <div class="auth-divider"><span>或使用邮箱登录</span></div>

    <form id="login-form" class="auth-form">
      <label class="auth-field">
        <span>邮箱</span>
        <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
      </label>
      <label class="auth-field">
        <span>密码</span>
        <input type="password" name="password" placeholder="••••••" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary">登录</button>
    </form>

    <p class="auth-foot">还没有账号？<a href="/auth/register.html">立即注册</a></p>
  </div>
</div>

<script>
const msg = document.getElementById('auth-msg');
const form = document.getElementById('login-form');
const googleBtn = document.getElementById('google-btn');

function showMsg(text, ok) {
  msg.style.display = 'block';
  msg.textContent = text;
  msg.className = 'auth-msg ' + (ok ? 'auth-msg-ok' : 'auth-msg-err');
}

const params = new URLSearchParams(location.search);
const token = params.get('token');
const error = params.get('error');

if (token) {
  localStorage.setItem('auth_token', token);
  history.replaceState(null, '', '/auth/');
  showMsg('登录成功，正在跳转...', true);
  setTimeout(() => { location.href = '/auth/dashboard.html'; }, 800);
} else if (error) {
  showMsg(decodeURIComponent(error), false);
}

googleBtn.addEventListener('click', () => {
  location.href = '/api/auth-google';
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(form);
  try {
    const r = await fetch('/api/auth-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: fd.get('email'), password: fd.get('password') }),
    });
    const d = await r.json();
    if (!d.ok) { showMsg(d.error, false); return; }
    localStorage.setItem('auth_token', d.token);
    showMsg('登录成功，正在跳转...', true);
    setTimeout(() => { location.href = '/auth/dashboard.html'; }, 800);
  } catch (err) {
    showMsg('网络错误，请重试', false);
  }
});
</script>
</body>
</html>
