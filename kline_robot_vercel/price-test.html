<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理台 - 行情数据测试</title>
<style>
:root{color-scheme:light;--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:#d2d2d7;--blue:#0071e3;--green:#248a3d;--red:#d70015;--amber:#b25000}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}
main{max-width:1080px;margin:auto;padding:32px 18px 64px}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
h1{font-size:30px;margin:0 0 7px}.sub{color:var(--muted);font-size:14px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,a.btn{border:0;border-radius:9px;padding:10px 14px;font:inherit;font-size:14px;cursor:pointer;text-decoration:none;background:#e8e8ed;color:var(--text)}
button.primary{background:var(--blue);color:#fff}button:disabled{opacity:.5;cursor:not-allowed}.summary{display:grid;grid-template-columns:1.2fr repeat(4,1fr);gap:12px;margin:18px 0}
.card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:15px;padding:17px;box-shadow:0 4px 20px rgba(0,0,0,.04)}
.label{font-size:12px;color:var(--muted);margin-bottom:8px}.value{font-size:20px;font-weight:650}.small-value{font-size:14px;line-height:1.45}.status{display:inline-flex;align-items:center;gap:7px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--amber)}.ok .dot{background:var(--green)}.bad .dot{background:var(--red)}
.panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:4px}.panel-head h2{font-size:20px;margin:0}#message{color:var(--muted);font-size:13px}
.group{margin-top:22px}.group:first-child{margin-top:12px}.group h3{font-size:15px;margin:0;padding:9px 0;color:var(--muted)}
.table{overflow-x:auto}.row{display:grid;grid-template-columns:1.1fr 1fr 1fr 0.8fr 0.8fr 1.4fr 1.4fr;gap:14px;align-items:center;padding:12px 4px;border-bottom:1px solid var(--line);min-width:900px}
.row.header{font-size:12px;color:var(--muted);padding-top:5px}.row:last-child{border-bottom:0}.symbol{font-weight:650}.up{color:var(--green)}.down{color:var(--red)}.muted{color:var(--muted);font-size:13px}
.empty{text-align:center;color:var(--muted);padding:55px 10px}.error{background:#fff2f2;color:var(--red);padding:14px;border-radius:10px;margin:14px 0;white-space:pre-wrap}
@media(max-width:820px){.head{display:block}.actions{justify-content:flex-start;margin-top:16px}.summary{grid-template-columns:1fr 1fr}.summary .card:first-child{grid-column:span 2}h1{font-size:25px}}
</style>
</head>
<body>
<main>
<section class="head">
 <div><h1>管理台 - 行情数据测试</h1><div class="sub">检查统一行情缓存、数据新鲜度和各标的获取状态</div></div>
 <div class="actions">
  <button class="primary" id="refresh">读取缓存</button>
  <button id="force">立即更新</button>
  <button id="start">启动自动更新</button>
  <button id="stop">停止自动更新</button>
  <a class="btn" id="raw" target="_blank">原始 JSON</a>
  <a class="btn" href="https://github.com/jiangshenhk/donew/actions/workflows/update-stockprice.yml" target="_blank">打开 Actions</a>
 </div>
</section>
<section class="summary">
 <div class="card"><div class="label">运行状态</div><div class="value status" id="status"><span class="dot"></span><span>检查中</span></div></div>
 <div class="card"><div class="label">成功 / 失败</div><div class="value" id="result">—</div></div>
 <div class="card"><div class="label">缓存更新时间</div><div class="value small-value" id="updated">—</div></div>
 <div class="card"><div class="label">后台检查时间</div><div class="value small-value" id="checked">—</div></div>
 <div class="card"><div class="label">缓存年龄</div><div class="value" id="age">—</div></div>
</section>
<section class="card">
 <div class="panel-head"><h2>最新行情</h2><span id="message"></span></div>
 <div id="error"></div><div id="data"><div class="empty">正在读取数据…</div></div>
</section>
</main>
<script>
const PRICE_URL='https://raw.githubusercontent.com/jiangshenhk/donew/main/stockprice/data/latest-price.json';
const CONTENTS_API='https://api.github.com/repos/jiangshenhk/donew/contents/stockprice/data/latest-price.json?ref=main';
const $=id=>document.getElementById(id);
const fmt=new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
$('raw').href=PRICE_URL;
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function ft(v){const d=v?new Date(v):null;return d&&!isNaN(d)?fmt.format(d):'—'}
function ageInfo(v){const d=v?new Date(v):null;if(!d||isNaN(d))return {text:'尚未更新',minutes:Infinity};const m=Math.max(0,Math.floor((Date.now()-d)/60000));return {minutes:m,text:m<1?'不到1分钟':m<60?m+'分钟':Math.floor(m/60)+'小时 '+m%60+'分钟'}}
function price(v){if(v===null||v===undefined)return '—';return Number(v).toLocaleString(undefined,{maximumFractionDigits:4})}
async function fetchLatestData(){
 try{
  const r=await fetch(CONTENTS_API+'&t='+Date.now(),{cache:'no-store',headers:{Accept:'application/vnd.github+json'}});
  if(!r.ok)throw new Error('GitHub API HTTP '+r.status);
  const meta=await r.json();
  if(!meta.content)throw new Error('GitHub API 未返回文件内容');
  const bytes=Uint8Array.from(atob(meta.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
  return {json:JSON.parse(new TextDecoder().decode(bytes)),source:'GitHub main · '+String(meta.sha||'').slice(0,7)};
 }catch(apiError){
  const r=await fetch(PRICE_URL+'?t='+Date.now(),{cache:'reload'});
  if(!r.ok)throw new Error('读取行情缓存失败：'+apiError.message+'；Raw HTTP '+r.status);
  return {json:await r.json(),source:'Raw 备用源'};
 }
}
async function loadPrice(){
 $('refresh').disabled=true;$('message').textContent='读取中…';$('error').innerHTML='';
 try{
  const loaded=await fetchLatestData(),j=loaded.json,items=Array.isArray(j.data)?j.data:[],success=j.successCount??items.filter(x=>!x.error).length,fail=j.failCount??items.filter(x=>x.error).length,a=ageInfo(j.checkedAt||j.updatedAt);
  $('result').textContent=success+' / '+fail;$('updated').textContent=ft(j.updatedAt);$('checked').textContent=ft(j.checkedAt);$('age').textContent=a.text;
  const healthy=a.minutes<=15&&success>0, stale=a.minutes>30;
  $('status').className='value status '+(healthy?'ok':stale?'bad':'');
  $('status').innerHTML='<span class="dot"></span><span>'+(healthy?(fail?'部分异常':'正常'):stale?'缓存过期':'等待更新')+'</span>';
  $('message').textContent='来源：'+loaded.source+'｜共 '+items.length+' 个标的｜页面检查：'+fmt.format(new Date());
  if(!items.length){$('data').innerHTML='<div class="empty">缓存中暂时没有行情数据。</div>';return}
  const groups={};items.forEach(x=>(groups[x.category||'Other']??=[]).push(x));
   $('data').innerHTML=Object.entries(groups).map(([name,list])=>'<section class="group"><h3>'+esc(name)+'</h3><div class="table"><div class="row header"><span>代码</span><span>价格</span><span>涨跌幅</span><span>vs5</span><span>vs10</span><span>市场时间</span><span>状态 / 市场</span></div>'+list.map(x=>{
    const n=Number(x.changePercent),cls=Number.isFinite(n)?(n>=0?'up':'down'):'muted',change=Number.isFinite(n)?(n>=0?'+':'')+n.toFixed(2)+'%':'—';
    const vs5=x.vs5Pct!=null?(Number(x.vs5Pct)>=0?'+':'')+Number(x.vs5Pct).toFixed(2)+'%':'—';
    const vs10=x.vs10Pct!=null?(Number(x.vs10Pct)>=0?'+':'')+Number(x.vs10Pct).toFixed(2)+'%':'—';
    const vsCls5=x.vs5Pct!=null?(Number(x.vs5Pct)>=0?'up':'down'):'muted';
    const vsCls10=x.vs10Pct!=null?(Number(x.vs10Pct)>=0?'up':'down'):'muted';
    return '<div class="row"><span class="symbol">'+esc(x.symbol)+'</span><span>'+price(x.price)+'</span><span class="'+cls+'">'+change+'</span><span class="'+vsCls5+'">'+vs5+'</span><span class="'+vsCls10+'">'+vs10+'</span><span class="muted">'+ft(x.marketTime)+'</span><span class="muted">'+esc(x.error?'失败：'+x.error:(x.exchange||'正常'))+'</span></div>'
   }).join('')+'</div></section>').join('');
 }catch(e){$('status').className='value status bad';$('status').innerHTML='<span class="dot"></span><span>读取失败</span>';$('message').textContent='';$('error').innerHTML='<div class="error">'+esc(e.message)+'</div>';$('data').innerHTML=''}
 finally{$('refresh').disabled=false}
}
async function callApi(url,label){
 $('message').textContent=label+'…';
 try{const r=await fetch(url);const text=await r.text();if(!r.ok)throw new Error('HTTP '+r.status+'：'+text.slice(0,180));$('message').textContent=label+'请求已发送';setTimeout(loadPrice,3500)}
 catch(e){$('error').innerHTML='<div class="error">'+esc(label+'失败：'+e.message)+'\n如果当前是 GitHub Pages，请改到 Vercel 测试页操作；GitHub Pages 只能读取缓存。</div>'}
}
$('refresh').onclick=loadPrice;$('force').onclick=()=>callApi('/api/price-refresh','立即更新');$('start').onclick=()=>callApi('/api/price-control?action=start','启动');$('stop').onclick=()=>callApi('/api/price-control?action=stop','停止');
loadPrice();
</script>
</body>
</html>
