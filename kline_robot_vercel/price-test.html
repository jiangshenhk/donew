<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理台 - 行情数据测试</title>
<style>
/* ═══ Reset & Base ═══ */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:#0f1117;color:#e1e4e8;font-size:13px}
main{max-width:1400px;margin:auto;padding:28px 20px 64px}

/* ═══ Header ═══ */
.header{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:12px;flex-wrap:wrap}
.header h1{font-size:24px;font-weight:600;margin:0 0 4px}
.sub{color:#8b949e;font-size:13px}
.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button,a.btn{border:1px solid #30363d;border-radius:8px;padding:7px 13px;font:inherit;font-size:13px;cursor:pointer;text-decoration:none;background:#21262d;color:#e1e4e8;white-space:nowrap}
button:hover,a.btn:hover{background:#30363d}
button.primary{background:#1f6feb;border-color:#1f6feb;color:#fff}
button.primary:hover{background:#388bfd}
button:disabled{opacity:.4;cursor:not-allowed}

/* ═══ Summary Cards ═══ */
.summary{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:10px 14px;min-width:130px}
.card .label{font-size:10px;color:#8b949e;text-transform:uppercase}
.card .value{font-size:17px;font-weight:600;margin-top:2px}
.card .sub-value{font-size:12px;color:#8b949e;margin-top:1px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px}
.status-ok .status-dot{background:#3fb950}
.status-warn .status-dot{background:#d29922}
.status-bad .status-dot{background:#f85149}

/* ═══ Event Log ═══ */
#eventLog{font-size:11px;color:#8b949e;margin-bottom:8px;line-height:1.6;max-height:44px;overflow:hidden}
#changeIndicator{display:none;color:#d29922;font-weight:600;margin-left:6px}

/* ═══ Table ═══ */
.table-wrap{overflow-x:auto;border:1px solid #30363d;border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:1000px}
thead{position:sticky;top:0;z-index:10}
th{padding:0;border-bottom:1px solid #30363d;user-select:none;white-space:nowrap;background:#161b22}
.th-inner{display:flex;align-items:center;gap:3px;padding:7px 8px;cursor:pointer;font-size:11px;font-weight:600;text-transform:uppercase;color:#8b949e}
.th-inner:hover{color:#58a6ff}
.th-inner .arrow{font-size:10px;min-width:10px}
.th-inner .filter-btn{margin-left:auto;cursor:pointer;font-size:10px;padding:2px 5px;border-radius:3px;color:#484f58}
.th-inner .filter-btn:hover{color:#58a6ff;background:#21262d}
.th-inner .filter-btn.active{color:#58a6ff}
.th-inner .filter-btn.has-filter{color:#d29922}

td{padding:7px 8px;border-bottom:1px solid #21262d;white-space:nowrap}
tr:hover td{background:#161b22}
.pos{color:#3fb950}
.neg{color:#f85149}

@keyframes rowFlash{0%{background:transparent}25%{background:rgba(88,166,255,.18)}60%{background:rgba(88,166,255,.05)}100%{background:transparent}}
tr.row-flash{animation:rowFlash 2s ease-out}

/* ═══ Pagination ═══ */
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;font-size:13px}
.pagination button{background:#21262d;border:1px solid #30363d;color:#e1e4e8;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:13px}
.pagination button:hover{background:#30363d}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination select{background:#161b22;border:1px solid #30363d;color:#e1e4e8;padding:5px 8px;border-radius:4px;font-size:13px}
.row-count{text-align:right;font-size:12px;color:#8b949e;margin-top:5px}
.empty-state{text-align:center;padding:50px 0;color:#484f58}

/* ═══ Filter Dropdown ═══ */
.filter-dropdown{position:absolute;z-index:999;display:none;flex-direction:column;background:#161b22;border:1px solid #30363d;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.6);min-width:200px;max-width:320px;max-height:340px;font-size:12px;color:#e1e4e8;text-transform:none}
.filter-dropdown.open{display:flex}
.fd-search{padding:6px 8px;border-bottom:1px solid #21262d}
.fd-search input{width:100%;background:#0d1117;border:1px solid #30363d;color:#e1e4e8;padding:4px 8px;border-radius:4px;font-size:12px;outline:none}
.fd-search input:focus{border-color:#58a6ff}
.fd-actions{display:flex;gap:6px;padding:5px 8px;border-bottom:1px solid #21262d}
.fd-actions button{background:#21262d;border:1px solid #30363d;color:#e1e4e8;padding:3px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.fd-actions button:hover{background:#30363d}
.fd-list{overflow-y:auto;flex:1;padding:4px 0}
.fd-item{display:flex;align-items:center;gap:6px;padding:3px 8px;cursor:pointer}
.fd-item:hover{background:#21262d}
.fd-item label{flex:1;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fd-item input[type=checkbox]{accent-color:#58a6ff;cursor:pointer;flex-shrink:0}
.fd-count{color:#484f58;font-size:11px;margin-left:auto;flex-shrink:0}
</style>
</head>
<body>
<main>

<!-- ═══ Header ═══ -->
<div class="header">
  <div>
    <h1>管理台 - 行情数据测试</h1>
    <div class="sub">最新行情列表 · 全部字段可排序筛选 · 每60秒自动刷新</div>
  </div>
  <div class="actions">
    <button class="primary" id="refresh">读取缓存</button>
    <button id="force">立即更新</button>
    <button id="start">启动</button>
    <button id="stop">停止</button>
    <a class="btn" id="raw" target="_blank">原始 JSON</a>
    <a class="btn" href="https://github.com/jiangshenhk/donew/actions/workflows/update-stockprice.yml" target="_blank">Actions</a>
  </div>
</div>

<!-- ═══ Summary Cards ═══ -->
<div class="summary" id="summaryBar"></div>

<!-- ═══ Event Log ═══ -->
<div id="eventLog"></div>

<!-- ═══ Table ═══ -->
<div class="table-wrap" id="tableWrap">
<table>
  <thead id="tableHead"></thead>
  <tbody id="tableBody"></tbody>
</table>
</div>
<div class="row-count" id="rowCount"></div>

<!-- ═══ Pagination ═══ -->
<div class="pagination">
  <button id="prevBtn" onclick="goPage(-1)">上一页</button>
  <span id="pageInfo"></span>
  <button id="nextBtn" onclick="goPage(1)">下一页</button>
  <span style="margin-left:8px;color:#8b949e;font-size:12px">每页</span>
  <select id="pageSizeSelect" onchange="pageSize=+this.value;currentPage=1;render()">
    <option value="15">15</option>
    <option value="30" selected>30</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
</div>

<!-- ═══ Filter Dropdown ═══ -->
<div class="filter-dropdown" id="filterDropdown"></div>
</main>

<script>
/* ═══════════════════════════════════════
   1. 常量与配置
   ═══════════════════════════════════════ */
const PRICE_URL='https://raw.githubusercontent.com/jiangshenhk/donew/main/stockprice/data/latest-price.json';
const CONTENTS_API='https://api.github.com/repos/jiangshenhk/donew/contents/stockprice/data/latest-price.json?ref=main';
const $=id=>document.getElementById(id);
const fmt=new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
$('raw').href=PRICE_URL;

const COLUMNS=[
  {key:'symbol',     w:85,  label:'代码'},
  {key:'category',   w:90,  label:'分类'},
  {key:'price',      w:85,  label:'价格'},
  {key:'change',     w:82,  label:'涨跌幅'},
  {key:'vs5',        w:75,  label:'VS5%'},
  {key:'vs10',       w:75,  label:'VS10%'},
  {key:'prevClose',  w:85,  label:'昨收'},
  {key:'sma5',       w:85,  label:'SMA5'},
  {key:'sma10',      w:85,  label:'SMA10'},
  {key:'marketTime', w:145, label:'市场时间'},
  {key:'exchange',   w:80,  label:'市场'},
  {key:'currency',   w:55,  label:'货币'},
  {key:'status',     w:55,  label:'状态'},
];

/* ═══════════════════════════════════════
   2. 状态
   ═══════════════════════════════════════ */
let rawData=[], filteredData=[];
let currentPage=1, pageSize=30;
let sortKey=null, sortAsc=true;
let refreshCount=0, loadSource='';
let updatedAt='', checkedAt='', successCount=0, failCount=0;

let openCol=null;
let filterState={};
let flashIds=new Set();
let prevPriceMap={};

/* ═══════════════════════════════════════
   3. 数据获取与转换
   ═══════════════════════════════════════ */
function ft(v){const d=v?new Date(v):null;return d&&!isNaN(d)?fmt.format(d):'—'}
function num(v,n){if(v===null||v===undefined||!isFinite(v))return'—';return Number(v).toFixed(n!=null?n:2)}
function pct(v){if(!isFinite(v))return'—';return(v>=0?'+':'')+v.toFixed(2)+'%'}

function transformItem(item){
  return {
    symbol:item.symbol||'—',
    category:item.category||'Other',
    price:Number(item.price)||0,
    change:parseFloat(item.changePercent)||0,
    vs5:parseFloat(item.vs5Pct)||0,
    vs10:parseFloat(item.vs10Pct)||0,
    prevClose:Number(item.previousClose)||0,
    sma5:Number(item.sma5)||0,
    sma10:Number(item.sma10)||0,
    marketTime:item.marketTime||'',
    exchange:item.exchange||'—',
    currency:item.currency||'—',
    status:item.error?'失败':'正常',
    _error:item.error||'',
  };
}

async function fetchLatestData(){
  try{
    const r=await fetch(CONTENTS_API+'&t='+Date.now(),{cache:'no-store',headers:{Accept:'application/vnd.github+json'}});
    if(!r.ok)throw new Error('GitHub API HTTP '+r.status);
    const meta=await r.json();
    if(!meta.content)throw new Error('GitHub API 未返回文件内容');
    const bytes=Uint8Array.from(atob(meta.content.replace(/\n/g,'')),c=>c.charCodeAt(0));
    return {json:JSON.parse(new TextDecoder().decode(bytes)),source:'GitHub main · '+(meta.sha||'').slice(0,7)};
  }catch(apiErr){
    const r=await fetch(PRICE_URL+'?t='+Date.now(),{cache:'reload'});
    if(!r.ok)throw new Error('读取行情缓存失败：'+apiErr.message+'；Raw HTTP '+r.status);
    return {json:await r.json(),source:'Raw 备用源'};
  }
}

function loadFromJson(loaded){
  const j=loaded.json, items=Array.isArray(j.data)?j.data:[];
  successCount=j.successCount??items.filter(x=>!x.error).length;
  failCount=j.failCount??items.filter(x=>x.error).length;
  updatedAt=j.updatedAt||''; checkedAt=j.checkedAt||'';
  loadSource=loaded.source;
  return items.map(transformItem);
}

/* ═══════════════════════════════════════
   4. 表头渲染
   ═══════════════════════════════════════ */
function renderHeader(){
  let html='<tr>';
  for(const col of COLUMNS){
    const arrow=sortKey===col.key?(sortAsc?' ▲':' ▼'):'';
    const hasF=filterState[col.key]&&filterState[col.key].size>0
              &&filterState[col.key].size<getUniqueVals(col.key).length;
    html+=`<th style="min-width:${col.w}px"><div class="th-inner" onclick="setSort('${col.key}')">
      <span>${col.label}</span><span class="arrow">${arrow}</span>
      <span class="filter-btn${openCol===col.key?' active':''}${hasF?' has-filter':''}"
        onclick="event.stopPropagation();toggleFilter('${col.key}')" data-col="${col.key}">${hasF?'⬡':'▽'}</span>
    </div></th>`;
  }
  $('tableHead').innerHTML=html+'</tr>';
}

/* ═══════════════════════════════════════
   5. 筛选下拉
   ═══════════════════════════════════════ */
function getUniqueVals(key){
  const map={};
  for(const r of rawData){
    const v=r[key];const s=String(v??'');
    map[s]=(map[s]||0)+1;
  }
  return Object.entries(map).sort((a,b)=>{
    const na=parseFloat(a[0]),nb=parseFloat(b[0]);
    if(!isNaN(na)&&!isNaN(nb)&&a[0]===String(na)&&b[0]===String(nb))return na-nb;
    return a[0].localeCompare(b[0]);
  });
}

function toggleFilter(key){
  const dd=$('filterDropdown');
  if(openCol===key){dd.classList.remove('open');openCol=null;renderHeader();return}
  openCol=key;renderHeader();
  const vals=getUniqueVals(key);
  const selected=filterState[key]||new Set(vals.map(v=>v[0]));
  if(!filterState[key])filterState[key]=selected;
  let html=`<div class="fd-search"><input type="text" placeholder="搜索..." oninput="filterDropdownSearch('${key}',this.value)"></div>`;
  html+=`<div class="fd-actions"><button onclick="checkAll('${key}',true)">全选</button><button onclick="checkAll('${key}',false)">取消全选</button></div>`;
  html+=`<div class="fd-list" id="fdList">`;
  for(const [v,cnt] of vals){
    const checked=selected.has(v)?'checked':'';
    html+=`<div class="fd-item"><input type="checkbox" value="${v.replace(/"/g,'&quot;')}" ${checked} onchange="toggleFilterVal('${key}',this.value,this.checked)"><label>${v}</label><span class="fd-count">${cnt}</span></div>`;
  }
  html+=`</div>`;
  dd.innerHTML=html;dd.dataset.key=key;
  const btn=document.querySelector(`.filter-btn[data-col="${key}"]`);
  if(btn){
    const rect=btn.getBoundingClientRect();
    const wrap=$('tableWrap').getBoundingClientRect();
    dd.style.top=(rect.bottom-wrap.top+4)+'px';
    dd.style.left=Math.max(4,rect.left-wrap.left-60)+'px';
  }
  dd.classList.add('open');
}

function filterDropdownSearch(key,q){
  document.querySelectorAll('#fdList .fd-item').forEach(item=>{
    item.style.display=item.querySelector('label').textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

function toggleFilterVal(key,val,checked){
  if(!filterState[key])filterState[key]=new Set();
  checked?filterState[key].add(val):filterState[key].delete(val);
  applyFilters();renderHeader();
}

function checkAll(key,checked){
  const vals=getUniqueVals(key);
  if(!filterState[key])filterState[key]=new Set();
  if(checked){for(const[v]of vals)filterState[key].add(v)}
  else filterState[key].clear();
  document.querySelectorAll('#fdList input[type=checkbox]').forEach(cb=>cb.checked=checked);
  applyFilters();renderHeader();
}

/* ═══════════════════════════════════════
   6. 核心管道：筛选 + 排序
   ═══════════════════════════════════════ */
function applyFilters(resetPage=true){
  filteredData=rawData.filter(r=>{
    for(const col of COLUMNS){
      const sel=filterState[col.key];
      if(!sel||sel.size===0)continue;
      if(sel.size<getUniqueVals(col.key).length){
        if(!sel.has(String(r[col.key]??'')))return false;
      }
    }
    return true;
  });
  if(sortKey){
    const asc=sortAsc?1:-1;
    filteredData.sort((a,b)=>{
      const va=a[sortKey],vb=b[sortKey];
      if(typeof va==='number'&&typeof vb==='number')return(va-vb)*asc;
      const na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb))return(na-nb)*asc;
      return String(va??'').localeCompare(String(vb??''))*asc;
    });
  }
  if(resetPage)currentPage=1;
  const totalPages=Math.ceil(filteredData.length/pageSize)||1;
  if(currentPage>totalPages)currentPage=totalPages;
  render();
}

function setSort(key){
  if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=true}
  renderHeader();applyFilters();
}

/* ═══════════════════════════════════════
   7. 翻页
   ═══════════════════════════════════════ */
function goPage(delta){
  const totalPages=Math.ceil(filteredData.length/pageSize)||1;
  currentPage=Math.max(1,Math.min(totalPages,currentPage+delta));
  render();
}

/* ═══════════════════════════════════════
   8. 渲染表格体
   ═══════════════════════════════════════ */
function render(){
  const total=filteredData.length;
  const totalPages=Math.ceil(total/pageSize)||1;
  const start=(currentPage-1)*pageSize;
  const end=Math.min(start+pageSize,total);
  const page=filteredData.slice(start,end);
  const tbody=$('tableBody');
  if(!page.length){
    tbody.innerHTML='<tr><td colspan="'+COLUMNS.length+'" class="empty-state">无匹配数据</td></tr>';
  }else{
    tbody.innerHTML=page.map(r=>{
      const fl=flashIds.has(r.symbol)?' row-flash':'';
      return `<tr class="${fl}"><td style="font-weight:600">${esc(r.symbol)}</td>
        <td>${esc(r.category)}</td><td>${num(r.price,2)}</td><td class="${r.change>=0?'pos':'neg'}">${pct(r.change)}</td>
        <td class="${r.vs5>=0?'pos':'neg'}">${pct(r.vs5)}</td><td class="${r.vs10>=0?'pos':'neg'}">${pct(r.vs10)}</td>
        <td>${num(r.prevClose,2)}</td><td>${num(r.sma5,2)}</td><td>${num(r.sma10,2)}</td>
        <td style="color:#8b949e">${ft(r.marketTime)||'—'}</td><td style="color:#8b949e">${esc(r.exchange)}</td>
        <td style="color:#8b949e">${esc(r.currency)}</td>
        <td class="${r.status==='正常'?'pos':'neg'}">${r.status}</td></tr>`;
    }).join('');
  }
  $('pageInfo').textContent=`${currentPage}/${totalPages}页`;
  $('prevBtn').disabled=currentPage<=1;
  $('nextBtn').disabled=currentPage>=totalPages;
  $('rowCount').textContent=`显示${end-start}/${total}条（共${rawData.length}条）`;
  renderSummaryBar();
}

/* ═══════════════════════════════════════
   9. 顶部状态卡片
   ═══════════════════════════════════════ */
function renderSummaryBar(){
  const aMins=updatedAt?Math.max(0,Math.floor((Date.now()-new Date(updatedAt))/60000)):Infinity;
  const ageText=updatedAt?(aMins<1?'不到1分钟':aMins<60?aMins+'分钟':Math.floor(aMins/60)+'时'+aMins%60+'分'):'尚未更新';
  const healthy=aMins<=15&&successCount>0;const stale=aMins>30;
  $('summaryBar').innerHTML=
    `<div class="card ${healthy?'status-ok':stale?'status-bad':'status-warn'}"><div class="label">状态</div><div class="value"><span class="status-dot"></span>${healthy?(failCount?'部分异常':'正常'):stale?'缓存过期':'等待更新'}</div></div>
    <div class="card"><div class="label">成功 / 失败</div><div class="value">${successCount} / ${failCount}</div></div>
    <div class="card"><div class="label">缓存时间</div><div class="value" style="font-size:14px">${ft(updatedAt)||'—'}</div></div>
    <div class="card"><div class="label">缓存年龄</div><div class="value">${ageText}</div></div>
    <div class="card"><div class="label">数据源</div><div class="sub-value">${esc(loadSource)}</div></div>
    <div class="card"><div class="label">刷新次数</div><div class="value">${refreshCount}</div><span id="changeIndicator" style="font-size:12px;margin-top:4px;${flashIds.size>0?'display:inline':'display:none'}">● 数据变更</span></div>`;
}

/* ═══════════════════════════════════════
   10. 数据变更日志
   ═══════════════════════════════════════ */
function logEvent(msg,color){
  const el=$('eventLog');if(!el)return;
  el.innerHTML=`<span style="${color?'color:'+color:''}">${new Date().toLocaleTimeString()} ${msg}</span>${el.innerHTML}`;
  while(el.children.length>10)el.removeChild(el.lastChild);
  const ind=$('changeIndicator');if(!ind)return;
  ind.style.display='inline';clearTimeout(ind._timer);
  ind._timer=setTimeout(()=>{ind.style.display='none'},2000);
}

function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ═══════════════════════════════════════
   11. 核心加载
   ═══════════════════════════════════════ */
async function loadPrice(silent=false){
  $('refresh').disabled=true;
  try{
    const loaded=await fetchLatestData();
    const newItems=loadFromJson(loaded);
    const oldMap=prevPriceMap;
    prevPriceMap={};
    const changed=[];
    for(const item of newItems){
      prevPriceMap[item.symbol]=item;
      const old=oldMap[item.symbol];
      if(old&&(old.price!==item.price||old.change!==item.change||old.status!==item.status)){
        changed.push(item.symbol);
      }
    }
    if(!silent&&changed.length){
      logEvent(changed.length+' 个标的价格变动：'+changed.join('、'),'#d29922');
    }
    rawData=newItems;
    flashIds=new Set(changed);
    applyFilters(false);
    if(changed.length&&!silent){render()}
    refreshCount++;
    if(!silent)renderSummaryBar();
  }catch(e){
    $('summaryBar').innerHTML='<div class="card status-bad"><div class="label">状态</div><div class="value"><span class="status-dot"></span>读取失败</div><div class="sub-value">'+esc(e.message).slice(0,80)+'</div></div>';
    $('tableBody').innerHTML='<tr><td colspan="'+COLUMNS.length+'" class="empty-state">读取行情缓存失败，请检查网络后重试。</td></tr>';
  }finally{$('refresh').disabled=false}
}

/* ═══════════════════════════════════════
   12. API 控制（保持现有接口）
   ═══════════════════════════════════════ */
async function callApi(url,label){
  try{const r=await fetch(url);const text=await r.text();if(!r.ok)throw new Error('HTTP '+r.status+'：'+text.slice(0,180));logEvent(label+'：请求已发送','#8b949e');setTimeout(loadPrice,5000)}
  catch(e){logEvent(label+'失败：'+e.message,'#f85149')}
}

/* ═══════════════════════════════════════
   13. 点击外部关闭下拉
   ═══════════════════════════════════════ */
document.addEventListener('click',e=>{
  if(!e.target.closest('.filter-dropdown')&&!e.target.closest('.filter-btn')){
    $('filterDropdown').classList.remove('open');
    openCol=null;renderHeader();
  }
});

/* ═══════════════════════════════════════
   14. 事件绑定与启动
   ═══════════════════════════════════════ */
$('refresh').onclick=()=>loadPrice();
$('force').onclick=()=>callApi('/api/price-refresh','立即更新');
$('start').onclick=()=>callApi('/api/price-control?action=start','启动');
$('stop').onclick=()=>callApi('/api/price-control?action=stop','停止');

renderHeader();
loadPrice().then(()=>{
  filteredData=[...rawData];
  renderHeader();
  applyFilters();
});

setInterval(()=>{loadPrice(true)},60000);
</script>
</body>
</html>
