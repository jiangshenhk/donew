<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>深渊守护者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;user-select:none;-webkit-user-select:none}
body{display:flex;justify-content:center;align-items:center}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const VW = 420, VH = 780;
let scale = 1;
let offX = 0, offY = 0;

function resize() {
  const r = VW / VH;
  let w = window.innerWidth, h = window.innerHeight;
  if (w / h > r) { w = h * r }
  else { h = w / r }
  canvas.width = Math.round(w);
  canvas.height = Math.round(h);
  scale = canvas.width / VW;
  offX = (window.innerWidth - canvas.width) / 2;
  offY = (window.innerHeight - canvas.height) / 2;
  canvas.style.marginLeft = offX + 'px';
  canvas.style.marginTop = offY + 'px';
}
resize();
window.addEventListener('resize', resize);

const WEAPONS = [
  { count: 1,  spread: 0,  rate: 250, bonus: 0 },
  { count: 3,  spread: 4,  rate: 250, bonus: 2 },
  { count: 5,  spread: 5,  rate: 250, bonus: 2 },
  { count: 7,  spread: 6,  rate: 240, bonus: 2 },
  { count: 9,  spread: 7,  rate: 230, bonus: 2 },
  { count: 11, spread: 8,  rate: 220, bonus: 2 },
  { count: 15, spread: 9,  rate: 200, bonus: 4 },
];

const GIFT_LANE = Math.round(VW * 0.28);
const ENEMY_LANE = VW - GIFT_LANE;

const state = {
  screen: 'menu',
  score: 0,
  weaponLv: 0,
  frame: 0,
  lastShot: 0,
  giftHP: 5,
};

const player = { x: VW / 2, y: VH - 42, w: 28, h: 32 };
const keys = { left: false, right: false };
let mouseX = null;
let mouseActive = false;

let gifts = [];
let bullets = [];
let squads = [];
let particles = [];

function giftY(i) { return 70 + i * 43; }

function makeGift() {
  const w = GIFT_LANE * 0.72;
  return { x: GIFT_LANE / 2 - w / 2, y: 0, w, h: 38, hp: state.giftHP, maxHp: state.giftHP, label: '' };
}

function repositionGifts() {
  for (let i = 0; i < gifts.length; i++) {
    gifts[i].y = giftY(i);
  }
}

function emit(x, y, n, color, spd, life) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * spd;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: life||30, maxLife: life||30, color, size: 1.5+Math.random()*3 });
  }
}

function spawnSquad() {
  const cols = 7, rows = 5 + Math.floor(Math.random() * 3);
  const gapX = 20, gapY = 18;
  const tw = cols * gapX;
  const sx = GIFT_LANE + (ENEMY_LANE - tw) / 2 + gapX / 2;
  const spd = 0.35 + state.frame * 0.00003;
  const hp = 80 + state.frame * 0.12;
  const ey = -55;

  const imps = [];
  for (let r = 0; r < rows; r++)
    for (let c = 0; c < cols; c++)
      imps.push({ x: sx + c * gapX, y: ey + 50 + r * gapY, w: 13, h: 13, hp: 1, spd });

  const demon = { x: sx + (tw) / 2 - 20, y: ey, w: 40, h: 46, hp, maxHp: hp, spd };

  squads.push({ imps, demon });
}

function shoot() {
  const now = Date.now();
  const wpn = WEAPONS[Math.min(state.weaponLv, WEAPONS.length - 1)];
  if (now - state.lastShot < wpn.rate) return;
  state.lastShot = now;

  const bx = player.x, by = player.y - player.h / 2;
  const bspd = 11, bw = 3, bh = 10;

  if (wpn.count === 1) {
    bullets.push({ x: bx - bw / 2, y: by, w: bw, h: bh, vy: -bspd });
  } else {
    const half = (wpn.count - 1) / 2;
    for (let i = 0; i < wpn.count; i++) {
      const off = (i - half) * wpn.spread;
      bullets.push({ x: bx + off - bw / 2, y: by, w: bw, h: bh, vy: -bspd + Math.abs(off) * 0.15 });
    }
  }
}

function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (state.screen !== 'playing') return;
  state.frame++;

  if (state.frame % 300 === 0) state.giftHP = Math.min(5 + Math.floor(state.frame / 1500), 20);
  if (state.frame % 180 === 0 && gifts.length < 5) { gifts.push(makeGift()); repositionGifts(); }
  if (state.frame === 60 || state.frame % 360 === 0) spawnSquad();

  const spd = 4;
  if (keys.left) { player.x -= spd; mouseActive = false; }
  if (keys.right) { player.x += spd; mouseActive = false; }
  if (mouseActive && mouseX !== null) {
    player.x += (mouseX - player.x) * 0.18;
  }
  player.x = Math.max(player.w / 2, Math.min(VW - player.w / 2, player.x));

  shoot();

  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.y += b.vy;
    if (b.y + b.h < 0 || b.y > VH) { bullets.splice(i, 1); continue; }
    let hit = false;

    if (b.x < GIFT_LANE) {
      for (const g of gifts) {
        if (aabb(b, g)) {
          g.hp--;
          emit(b.x + b.w / 2, b.y, 2, '#7ec8e3', 2, 10);
          if (g.hp <= 0) {
            if (state.weaponLv < WEAPONS.length - 1) state.weaponLv++;
            else state.score += 50;
            emit(g.x + g.w / 2, g.y + g.h / 2, 25, '#00d2ff', 4, 30);
            gifts.splice(gifts.indexOf(g), 1);
            repositionGifts();
          }
          hit = true; break;
        }
      }
    }

    if (!hit && b.x + b.w > GIFT_LANE) {
      for (const sq of squads) {
        for (let j = sq.imps.length - 1; j >= 0; j--) {
          if (aabb(b, sq.imps[j])) {
            sq.imps.splice(j, 1);
            state.score += 10;
            hit = true; break;
          }
        }
        if (hit) break;
        if (aabb(b, sq.demon)) {
          sq.demon.hp--;
          emit(b.x + b.w / 2, b.y, 4, '#ff4757', 2, 14);
          if (sq.demon.hp <= 0) {
            state.score += 100;
            emit(sq.demon.x + sq.demon.w / 2, sq.demon.y + sq.demon.h / 2, 45, '#ff4757', 6, 30);
          }
          hit = true; break;
        }
      }
    }
    if (hit) bullets.splice(i, 1);
  }

  for (let i = squads.length - 1; i >= 0; i--) {
    const sq = squads[i];
    let alive = false;
    for (const imp of sq.imps) { imp.y += imp.spd; alive = true; }
    sq.demon.y += sq.demon.spd;
    if (sq.demon.hp > 0) alive = true;
    if (sq.demon.y + sq.demon.h > VH - 20 && sq.demon.hp > 0) { state.screen = 'gameover'; return; }
    if (!alive) squads.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    if (--p.life <= 0) particles.splice(i, 1);
  }
}

// ─── Draw ───────────────────────────────────────────────────────

function bg() {
  ctx.fillStyle = '#0a0a1a';
  ctx.fillRect(0, 0, VW, VH);

  const grd = ctx.createLinearGradient(0, 0, GIFT_LANE, 0);
  grd.addColorStop(0, 'rgba(0,50,100,0.12)');
  grd.addColorStop(1, 'rgba(0,50,100,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, GIFT_LANE, VH);

  ctx.strokeStyle = 'rgba(0,100,200,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 5]);
  ctx.beginPath(); ctx.moveTo(GIFT_LANE, 0); ctx.lineTo(GIFT_LANE, VH); ctx.stroke();
  ctx.setLineDash([]);

  for (let i = 0; i < 20; i++) {
    const sx = (i * 137.5 + state.frame * 0.3) % VW;
    const sy = (i * 97.3 + state.frame * 0.15) % VH;
    ctx.fillStyle = `rgba(100,150,255,${0.05 + Math.sin(i * 2.7 + state.frame * 0.008) * 0.03})`;
    ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill();
  }
}

function rRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawGift(g) {
  const pct = g.hp / g.maxHp;
  ctx.save();

  const grd = ctx.createLinearGradient(g.x, g.y, g.x, g.y + g.h);
  grd.addColorStop(0, `rgba(80,170,255,${0.5 + pct * 0.4})`);
  grd.addColorStop(1, `rgba(40,90,200,${0.5 + pct * 0.4})`);
  ctx.fillStyle = grd;
  ctx.strokeStyle = `rgba(180,220,255,${pct * 0.6 + 0.2})`;
  ctx.lineWidth = 1.5;
  rRect(g.x, g.y, g.w, g.h, 4);
  ctx.fill(); ctx.stroke();

  if (pct > 0.2) {
    ctx.fillStyle = `rgba(255,255,255,${pct * 0.3})`;
    for (let i = 0; i < 4; i++) {
      const ix = g.x + 6 + (i * 17 + 5) % (g.w - 12);
      const iy = g.y + 6 + (i * 13 + 7) % (g.h - 12);
      ctx.beginPath();
      ctx.moveTo(ix, iy); ctx.lineTo(ix + 2.5, iy + 4); ctx.lineTo(ix - 2.5, iy + 4);
      ctx.closePath(); ctx.fill();
    }
  }

  const bw = g.w - 14, bh = 3;
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  rRect(g.x + 7, g.y + g.h - 9, bw, bh, 1.5); ctx.fill();
  ctx.fillStyle = `rgba(120,210,255,0.85)`;
  rRect(g.x + 7, g.y + g.h - 9, bw * (1 - pct), bh, 1.5); ctx.fill();

  ctx.fillStyle = `rgba(255,255,255,${1 - pct * 0.4})`;
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('❄' + g.hp, g.x + g.w / 2, g.y + g.h / 2 - 3);

  const next = state.weaponLv < WEAPONS.length - 1 ? WEAPONS[state.weaponLv + 1] : null;
  if (next && next.bonus > 0) {
    ctx.fillStyle = '#ffd700';
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText('+' + next.bonus + '弹道', g.x + g.w / 2, g.y + g.h / 2 + 13);
  }
  ctx.restore();
}

function drawDemon(d) {
  ctx.save();
  const grd = ctx.createRadialGradient(d.x + d.w / 2, d.y + d.h / 2, 3, d.x + d.w / 2, d.y + d.h / 2, d.w / 2);
  grd.addColorStop(0, '#8b0000'); grd.addColorStop(0.5, '#4a0000'); grd.addColorStop(1, '#1a0000');
  ctx.fillStyle = grd;
  rRect(d.x, d.y, d.w, d.h, 6); ctx.fill();

  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = '20px sans-serif';
  ctx.fillText('👹', d.x + d.w / 2, d.y + d.h / 2);

  const hpPct = d.hp / d.maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  rRect(d.x, d.y - 7, d.w, 4, 2); ctx.fill();
  ctx.fillStyle = hpPct > 0.3 ? '#ff4444' : '#ff0000';
  rRect(d.x, d.y - 7, d.w * hpPct, 4, 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = '6px sans-serif';
  ctx.fillText(Math.ceil(d.hp), d.x + d.w / 2, d.y - 5);
  ctx.restore();
}

function drawImp(imp) {
  ctx.save();
  ctx.fillStyle = '#2d1b00';
  ctx.beginPath(); ctx.arc(imp.x + imp.w / 2, imp.y + imp.h / 2, imp.w / 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#ff4444';
  ctx.beginPath(); ctx.arc(imp.x + imp.w / 2, imp.y + imp.h / 2, 2.5, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#8b0000';
  ctx.beginPath();
  ctx.arc(imp.x + imp.w / 2 - 2, imp.y + imp.h / 2 - 2.5, 1.2, 0, Math.PI * 2);
  ctx.arc(imp.x + imp.w / 2 + 2, imp.y + imp.h / 2 - 2.5, 1.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPlayer() {
  ctx.save();
  ctx.fillStyle = '#1a1a2e';
  rRect(player.x - player.w / 2 + 2, player.y + 3, player.w - 4, player.h - 6, 4);
  ctx.fill();

  ctx.fillStyle = '#e2b631';
  ctx.beginPath(); ctx.arc(player.x, player.y - 3, player.w / 2 - 2, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(player.x - 4, player.y - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x + 4, player.y - 6, 2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(player.x - 4, player.y - 6, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(player.x + 4, player.y - 6, 1, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#e2b631';
  ctx.fillRect(player.x - 8, player.y, 2.5, 4);
  ctx.fillRect(player.x + 5.5, player.y, 2.5, 4);

  const wpn = WEAPONS[Math.min(state.weaponLv, WEAPONS.length - 1)];
  ctx.fillStyle = '#4fc3f7';
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 8;
  ctx.fillRect(player.x - 1, player.y - 12, 2, 9);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.fillStyle = '#4fc3f7';
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 8;
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#b3e5fc';
  ctx.fillRect(b.x, b.y, b.w, b.h * 0.5);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    const a = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawHUD() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, VW, 30);

  ctx.fillStyle = '#fff';
  ctx.font = 'bold 11px sans-serif';
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'left';
  ctx.fillText('⭐' + state.score, 8, 15);

  ctx.textAlign = 'center';
  const wpn = WEAPONS[Math.min(state.weaponLv, WEAPONS.length - 1)];
  ctx.fillStyle = '#4fc3f7';
  ctx.fillText('🔫' + wpn.count + '弹道', VW / 2, 15);

  ctx.textAlign = 'right';
  ctx.fillStyle = '#888';
  ctx.fillText(Math.floor(state.frame / 60) + 's', VW - 8, 15);

  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(GIFT_LANE, VH - 3, ENEMY_LANE, 3);
  ctx.restore();
}

function render() {
  ctx.save();
  ctx.scale(scale, scale);
  bg();

  if (state.screen === 'menu') {
    ctx.fillStyle = 'rgba(0,20,40,0.7)';
    ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#00d2ff';
    ctx.font = 'bold 32px sans-serif';
    ctx.shadowColor = '#00d2ff'; ctx.shadowBlur = 20;
    ctx.fillText('深渊守护者', VW / 2, VH / 2 - 80);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#aaa';
    ctx.font = '13px sans-serif';
    ctx.fillText('← → / A,D / 鼠标移动', VW / 2, VH / 2 - 25);
    ctx.fillText('射击冰封礼物获取弹道升级', VW / 2, VH / 2 + 5);
    ctx.font = '11px sans-serif';
    ctx.fillStyle = '#666';
    ctx.fillText('恶魔走到底部即为失败', VW / 2, VH / 2 + 35);

    ctx.fillStyle = '#00d2ff';
    ctx.font = 'bold 16px sans-serif';
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.5;
    ctx.fillText('— 点击 / 按空格开始 —', VW / 2, VH / 2 + 85);
    ctx.restore(); return;
  }

  if (state.screen === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, VW, VH);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.fillStyle = '#ff4757';
    ctx.font = 'bold 30px sans-serif';
    ctx.shadowColor = '#ff4757'; ctx.shadowBlur = 20;
    ctx.fillText('游戏结束', VW / 2, VH / 2 - 75);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '20px sans-serif';
    ctx.fillText('得分: ' + state.score, VW / 2, VH / 2 - 20);
    ctx.fillStyle = '#aaa';
    ctx.font = '14px sans-serif';
    ctx.fillText('存活 ' + Math.floor(state.frame / 60) + ' 秒', VW / 2, VH / 2 + 15);
    const wpn = WEAPONS[Math.min(state.weaponLv, WEAPONS.length - 1)];
    ctx.fillStyle = '#4fc3f7';
    ctx.fillText('最终: ' + wpn.count + '弹道', VW / 2, VH / 2 + 45);

    ctx.fillStyle = '#00d2ff';
    ctx.font = 'bold 16px sans-serif';
    ctx.globalAlpha = 0.5 + Math.sin(Date.now() * 0.003) * 0.5;
    ctx.fillText('— 点击重新开始 —', VW / 2, VH / 2 + 100);
    ctx.restore(); return;
  }

  // gift lane
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, GIFT_LANE, VH); ctx.clip();
  ctx.fillStyle = 'rgba(0,60,120,0.06)';
  ctx.fillRect(0, 0, GIFT_LANE, VH);
  ctx.fillStyle = 'rgba(0,120,200,0.07)';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('— 礼物 —', GIFT_LANE / 2, 55);
  for (const g of gifts) if (g.hp > 0) drawGift(g);
  ctx.restore();

  // enemy lane
  ctx.save();
  ctx.beginPath(); ctx.rect(GIFT_LANE, 0, ENEMY_LANE, VH); ctx.clip();
  for (const sq of squads) {
    for (const imp of sq.imps) drawImp(imp);
    if (sq.demon.hp > 0) drawDemon(sq.demon);
  }
  ctx.restore();

  drawParticles();
  for (const b of bullets) drawBullet(b);
  drawPlayer();
  drawHUD();
  ctx.restore();
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

function startGame() {
  state.score = 0;
  state.weaponLv = 0;
  state.frame = 0;
  state.giftHP = 5;
  state.screen = 'playing';
  player.x = VW / 2;
  bullets = []; squads = []; particles = []; gifts = [];
  for (let i = 0; i < 5; i++) { gifts.push(makeGift()); }
  repositionGifts();
}

// ─── Input ──────────────────────────────────────────────────────

function screenToVX(clientX) {
  const rect = canvas.getBoundingClientRect();
  return ((clientX - rect.left) * (canvas.width / rect.width)) / scale;
}

canvas.addEventListener('click', () => {
  if (state.screen !== 'playing') startGame();
});

canvas.addEventListener('mousemove', e => {
  if (state.screen !== 'playing') return;
  mouseX = screenToVX(e.clientX);
  mouseActive = true;
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  if (state.screen !== 'playing') { startGame(); return; }
  mouseX = screenToVX(t.clientX);
  mouseActive = true;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = screenToVX(t.clientX);
  mouseActive = true;
}, { passive: false });

canvas.addEventListener('touchend', e => { e.preventDefault(); }, { passive: false });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = true;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = true;
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); if (state.screen !== 'playing') startGame(); }
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') keys.left = false;
  if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') keys.right = false;
});

loop();
</script>
</body>
</html>
