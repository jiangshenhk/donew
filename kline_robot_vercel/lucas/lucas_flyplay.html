<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打飞机 🛩️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#0a0a1a;font-family:Arial,sans-serif;user-select:none}
#gameCanvas{display:block;margin:0 auto;background:#0f1a2e;cursor:none}

#ui{
  position:absolute;top:0;left:0;width:100%;height:100%;
  pointer-events:none;color:#fff
}
#score{position:absolute;top:16px;right:20px;font-size:20px;font-weight:bold;text-shadow:0 0 8px rgba(0,150,255,0.5)}
#lives{position:absolute;top:16px;left:20px;font-size:18px}
#level{position:absolute;top:44px;right:20px;font-size:13px;color:#888}
#gameOver{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;display:none;pointer-events:auto
}
#gameOver h1{font-size:48px;color:#f44;text-shadow:0 0 20px rgba(255,0,0,0.5)}
#gameOver p{font-size:18px;color:#aaa;margin:12px 0 20px}
#gameOver button{
  padding:12px 36px;font-size:18px;border:none;border-radius:8px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;
  cursor:pointer;pointer-events:auto;font-weight:bold
}
#gameOver button:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af)}

#startScreen{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:#fff
}
#startScreen h1{font-size:52px;margin-bottom:8px;text-shadow:0 0 20px rgba(0,150,255,0.3)}
#startScreen .sub{font-size:15px;color:#888;margin-bottom:30px}
#startScreen button{
  padding:14px 48px;font-size:20px;border:none;border-radius:10px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;
  cursor:pointer;font-weight:bold
}
#startScreen button:hover{background:linear-gradient(135deg,#1d4ed8,#1e40af)}
#startScreen .controls{font-size:13px;color:#666;margin-top:24px;line-height:1.8}
#startScreen .controls span{color:#888}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="lives">❤️❤️❤️</div>
  <div id="score">0</div>
  <div id="level">LEVEL 1</div>

  <div id="startScreen">
    <h1>🛩️ 打飞机</h1>
    <div class="sub">Shoot 'em up!</div>
    <button id="startBtn">开始游戏</button>
    <div class="controls">
      <span>鼠标 / 触屏</span> 移动 &nbsp;|&nbsp; <span>点击 / 空格</span> 射击<br>
      击落敌机得分，被撞则损失生命
    </div>
  </div>

  <div id="gameOver">
    <h1>💥 GAME OVER</h1>
    <p id="finalScore">得分: 0</p>
    <button id="restartBtn">再来一次</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas')
const ctx = canvas.getContext('2d')

function resize() {
  canvas.width = Math.min(800, window.innerWidth)
  canvas.height = Math.min(700, window.innerHeight - 20)
}
resize()
window.addEventListener('resize', resize)

// --- Game state ---
const game = {
  player: { x: 0, y: 0, w: 36, h: 36 },
  bullets: [],
  enemies: [],
  explosions: [],
  stars: [],
  score: 0,
  lives: 3,
  level: 1,
  running: false,
  over: false,
  frame: 0,
  spawnTimer: 0,
  spawnInterval: 60,
  fireTimer: 0,
  fireRate: 12,
  mouseX: canvas.width / 2,
  mouseY: canvas.height - 100,
  shooting: false,
  difficulty: 1,
}

// --- Stars background ---
for (let i = 0; i < 120; i++) {
  game.stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    s: 0.5 + Math.random() * 1.5,
    b: 0.3 + Math.random() * 0.7,
  })
}

// --- Player plane shape (drawn with canvas) ---
function drawPlayer(x, y, w, h) {
  ctx.save()
  ctx.translate(x, y)

  // Body
  ctx.fillStyle = '#4fc3f7'
  ctx.beginPath()
  ctx.moveTo(0, -h / 2)
  ctx.lineTo(-w / 2.5, h / 3)
  ctx.lineTo(-w / 5, h / 2.5)
  ctx.lineTo(0, h / 3.5)
  ctx.lineTo(w / 5, h / 2.5)
  ctx.lineTo(w / 2.5, h / 3)
  ctx.closePath()
  ctx.fill()
  ctx.strokeStyle = '#29b6f6'
  ctx.lineWidth = 1.5
  ctx.stroke()

  // Cockpit
  ctx.fillStyle = '#81d4fa'
  ctx.beginPath()
  ctx.ellipse(0, -h / 8, w / 6, h / 6, 0, 0, Math.PI * 2)
  ctx.fill()

  // Wings
  ctx.fillStyle = '#039be5'
  ctx.beginPath()
  ctx.moveTo(-w / 2.8, h / 6)
  ctx.lineTo(-w / 1.2, h / 2)
  ctx.lineTo(-w / 3, h / 3)
  ctx.closePath()
  ctx.fill()
  ctx.beginPath()
  ctx.moveTo(w / 2.8, h / 6)
  ctx.lineTo(w / 1.2, h / 2)
  ctx.lineTo(w / 3, h / 3)
  ctx.closePath()
  ctx.fill()

  // Engine glow
  ctx.fillStyle = `rgba(255,150,50,${0.4 + Math.sin(game.frame * 0.2) * 0.3})`
  ctx.beginPath()
  ctx.ellipse(0, h / 2.8, w / 5, h / 10, 0, 0, Math.PI * 2)
  ctx.fill()

  ctx.restore()
}

// --- Enemy plane ---
function drawEnemy(e) {
  ctx.save()
  ctx.translate(e.x, e.y)
  const rot = e.rot || 0
  ctx.rotate(rot)

  const w = e.w, h = e.h

  // Body darker green
  ctx.fillStyle = e.hp > 1 ? '#c62828' : '#ef5350'
  ctx.beginPath()
  ctx.moveTo(0, h / 2)
  ctx.lineTo(-w / 2.5, -h / 3)
  ctx.lineTo(-w / 5, -h / 2.5)
  ctx.lineTo(0, -h / 3.5)
  ctx.lineTo(w / 5, -h / 2.5)
  ctx.lineTo(w / 2.5, -h / 3)
  ctx.closePath()
  ctx.fill()
  ctx.strokeStyle = '#b71c1c'
  ctx.lineWidth = 1
  ctx.stroke()

  // Wings
  ctx.fillStyle = '#d32f2f'
  ctx.beginPath()
  ctx.moveTo(-w / 2.5, -h / 6)
  ctx.lineTo(-w, -h / 3.5)
  ctx.lineTo(-w / 3, -h / 4)
  ctx.closePath()
  ctx.fill()
  ctx.beginPath()
  ctx.moveTo(w / 2.5, -h / 6)
  ctx.lineTo(w, -h / 3.5)
  ctx.lineTo(w / 3, -h / 4)
  ctx.closePath()
  ctx.fill()

  ctx.restore()
}

// --- Explosion ---
function spawnExplosion(x, y, big) {
  for (let i = 0; i < (big ? 25 : 12); i++) {
    const angle = Math.random() * Math.PI * 2
    const speed = 30 + Math.random() * (big ? 80 : 40)
    game.explosions.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 20 + Math.random() * (big ? 30 : 15),
      maxLife: 20 + Math.random() * (big ? 30 : 15),
      size: 2 + Math.random() * (big ? 6 : 3),
      color: ['#ff6f00', '#ff8f00', '#ffab00', '#ffd600', '#fff'][Math.floor(Math.random() * 5)],
    })
  }
}

// --- Spawn enemy ---
function spawnEnemy() {
  const w = 24 + Math.random() * 16
  const h = 24 + Math.random() * 16
  const isElite = Math.random() < 0.15 + game.level * 0.02
  game.enemies.push({
    x: 30 + Math.random() * (canvas.width - 60),
    y: -h,
    w, h,
    speed: 40 + Math.random() * 30 + game.level * 3,
    hp: isElite ? 3 : 1,
    rot: 0,
    wobble: Math.random() * 100,
    isElite,
  })
}

// --- Fire bullet ---
function fireBullet() {
  game.bullets.push({
    x: game.player.x,
    y: game.player.y - game.player.h / 2,
    vx: (Math.random() - 0.5) * 8,
    vy: -350 - Math.random() * 50,
    w: 3,
    h: 10,
  })
}

// --- Init player ---
function initPlayer() {
  game.player.x = canvas.width / 2
  game.player.y = canvas.height - 80
}

// --- Reset game ---
function resetGame() {
  game.bullets = []
  game.enemies = []
  game.explosions = []
  game.score = 0
  game.lives = 3
  game.level = 1
  game.over = false
  game.running = true
  game.spawnTimer = 0
  game.frame = 0
  game.difficulty = 1
  game.spawnInterval = 55
  game.fireTimer = 0
  initPlayer()
  document.getElementById('startScreen').style.display = 'none'
  document.getElementById('gameOver').style.display = 'none'
  document.getElementById('score').textContent = '0'
  document.getElementById('lives').textContent = '❤️❤️❤️'
  document.getElementById('level').textContent = 'LEVEL 1'
}

// --- Update ---
function update(dt) {
  if (!game.running || game.over) return
  game.frame++

  // Player position (follow mouse, clamped)
  game.player.x += (game.mouseX - game.player.x) * 0.15
  game.player.y += (game.mouseY - game.player.y) * 0.15
  game.player.x = Math.max(game.player.w / 2, Math.min(canvas.width - game.player.w / 2, game.player.x))
  game.player.y = Math.max(game.player.h / 2, Math.min(canvas.height - game.player.h / 2, game.player.y))

  // Shooting
  if (game.shooting) {
    game.fireTimer++
    if (game.fireTimer >= game.fireRate) {
      fireBullet()
      game.fireTimer = 0
    }
  } else {
    game.fireTimer = game.fireRate - 3
  }

  // --- Bullets ---
  for (let i = game.bullets.length - 1; i >= 0; i--) {
    const b = game.bullets[i]
    b.x += b.vx * dt
    b.y += b.vy * dt
    if (b.y < -20 || b.x < -20 || b.x > canvas.width + 20) {
      game.bullets.splice(i, 1)
    }
  }

  // --- Spawn enemies ---
  game.spawnTimer++
  if (game.spawnTimer >= game.spawnInterval) {
    spawnEnemy()
    game.spawnTimer = 0
    if (game.spawnInterval > 20) game.spawnInterval -= 0.3 * game.difficulty
  }

  // Level up
  const newLevel = Math.floor(game.score / 200) + 1
  if (newLevel > game.level) {
    game.level = newLevel
    game.difficulty = 1 + (game.level - 1) * 0.2
    document.getElementById('level').textContent = 'LEVEL ' + game.level
  }

  // --- Enemies ---
  for (let i = game.enemies.length - 1; i >= 0; i--) {
    const e = game.enemies[i]
    e.y += e.speed * dt
    e.x += Math.sin(game.frame * 0.02 + e.wobble) * 15 * dt
    e.rot = Math.sin(game.frame * 0.03 + e.wobble) * 0.05

    // Bullet collision
    for (let j = game.bullets.length - 1; j >= 0; j--) {
      const b = game.bullets[j]
      if (b.x > e.x - e.w / 2 && b.x < e.x + e.w / 2 &&
          b.y > e.y - e.h / 2 && b.y < e.y + e.h / 2) {
        game.bullets.splice(j, 1)
        e.hp--
        if (e.hp <= 0) {
          spawnExplosion(e.x, e.y, e.isElite)
          game.score += e.isElite ? 30 : 10
          document.getElementById('score').textContent = game.score
          game.enemies.splice(i, 1)
        }
        break
      }
    }
    if (i >= game.enemies.length) continue

    // Player collision
    const dx = game.player.x - e.x
    const dy = game.player.y - e.y
    const dist = Math.sqrt(dx * dx + dy * dy)
    if (dist < game.player.w / 2 + e.w / 2 - 6) {
      spawnExplosion(game.player.x, game.player.y, true)
      game.lives--
      document.getElementById('lives').textContent = '❤️'.repeat(game.lives) + '🖤'.repeat(3 - game.lives)
      game.enemies.splice(i, 1)
      if (game.lives <= 0) {
        game.running = false
        game.over = true
        document.getElementById('finalScore').textContent = '得分: ' + game.score
        document.getElementById('gameOver').style.display = 'block'
        return
      }
      initPlayer()
    }

    // Off screen
    if (e.y > canvas.height + 50) {
      game.enemies.splice(i, 1)
    }
  }

  // --- Explosions ---
  for (let i = game.explosions.length - 1; i >= 0; i--) {
    const p = game.explosions[i]
    p.x += p.vx * dt
    p.y += p.vy * dt
    p.vy += 80 * dt
    p.life--
    if (p.life <= 0) {
      game.explosions.splice(i, 1)
    }
  }
}

// --- Draw ---
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height)

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height)
  grad.addColorStop(0, '#0a1628')
  grad.addColorStop(0.5, '#0f1a2e')
  grad.addColorStop(1, '#162035')
  ctx.fillStyle = grad
  ctx.fillRect(0, 0, canvas.width, canvas.height)

  // Stars
  game.stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.b * (0.6 + Math.sin(game.frame * 0.01 + s.x) * 0.3)})`
    ctx.beginPath()
    ctx.arc(s.x, (s.y + game.frame * 0.3 * s.s) % canvas.height, s.s, 0, Math.PI * 2)
    ctx.fill()
  })

  // Bullets
  ctx.shadowColor = '#4fc3f7'
  ctx.shadowBlur = 8
  game.bullets.forEach(b => {
    ctx.fillStyle = '#4fc3f7'
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h)
    ctx.fillStyle = '#b3e5fc'
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h / 2)
  })
  ctx.shadowBlur = 0

  // Enemies
  game.enemies.forEach(drawEnemy)

  // Player
  if (!game.over) {
    drawPlayer(game.player.x, game.player.y, game.player.w, game.player.h)
  }

  // Explosions
  game.explosions.forEach(p => {
    const alpha = p.life / p.maxLife
    ctx.globalAlpha = alpha
    ctx.fillStyle = p.color
    ctx.beginPath()
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2)
    ctx.fill()
  })
  ctx.globalAlpha = 1
}

// --- Game loop ---
let lastTime = 0
function loop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05)
  lastTime = time
  if (game.running) update(dt)
  draw()
  requestAnimationFrame(loop)
}

// --- Input ---
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect()
  game.mouseX = (e.clientX - rect.left) * (canvas.width / rect.width)
  game.mouseY = (e.clientY - rect.top) * (canvas.height / rect.height)
})

canvas.addEventListener('mousedown', e => {
  e.preventDefault()
  game.shooting = true
  if (!game.running && !game.over) {
    // clicking on start screen
  }
})

canvas.addEventListener('mouseup', () => { game.shooting = false })
canvas.addEventListener('mouseleave', () => { game.shooting = false })

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault()
  const t = e.touches[0]
  const rect = canvas.getBoundingClientRect()
  game.mouseX = (t.clientX - rect.left) * (canvas.width / rect.width)
  game.mouseY = (t.clientY - rect.top) * (canvas.height / rect.height)
  game.shooting = true
})

canvas.addEventListener('touchmove', e => {
  e.preventDefault()
  const t = e.touches[0]
  const rect = canvas.getBoundingClientRect()
  game.mouseX = (t.clientX - rect.left) * (canvas.width / rect.width)
  game.mouseY = (t.clientY - rect.top) * (canvas.height / rect.height)
})

canvas.addEventListener('touchend', e => {
  e.preventDefault()
  game.shooting = false
})

// Keyboard
document.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault()
    if (!game.running && game.over) {
      resetGame()
      return
    }
    if (!game.running && !game.over) {
      resetGame()
      return
    }
    game.shooting = true
  }
})

document.addEventListener('keyup', e => {
  if (e.code === 'Space') {
    e.preventDefault()
    game.shooting = false
  }
})

// --- Start / Restart buttons ---
document.getElementById('startBtn').addEventListener('click', resetGame)
document.getElementById('restartBtn').addEventListener('click', resetGame)

// --- Init ---
initPlayer()
loop(0)
</script>
</body>
</html>
