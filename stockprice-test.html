<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Stock Price Center Test</title>
<style>
body{font-family:Arial,sans-serif;margin:30px;background:#f7f7f7}
.box,.group{background:white;margin-bottom:15px;padding:15px;border-radius:8px}
.ok{color:green;font-weight:bold}.warn{color:#d98b00;font-weight:bold}.bad{color:red;font-weight:bold}
table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #ddd;text-align:left}
button{padding:8px 15px;margin-right:10px}
</style>
</head>
<body>
<h1>行情中心测试</h1>
<div class="box" id="status">加载状态...</div>
<button onclick="loadPrice()">刷新缓存</button>
<button onclick="loadStatus()">刷新状态</button>
<button onclick="loadHealth()">健康检查</button>
<div id="content"></div>
<script>
async function loadPrice(){
 const r=await fetch('/api/latest-price');
 const j=await r.json();
 document.getElementById('status').innerHTML=`缓存更新时间: ${j.updatedAt||'-'}<br>数据数量: ${(j.data||[]).length}`;
 const groups={};
 (j.data||[]).forEach(x=>{const c=x.category||'Other';(groups[c]||(groups[c]=[])).push(x)});
 document.getElementById('content').innerHTML=Object.keys(groups).map(c=>`
 <div class="group"><h3>${c}</h3><table>
 <tr><th>代码</th><th>价格</th><th>涨跌幅</th><th>行情时间</th></tr>
 ${groups[c].map(x=>`<tr><td>${x.symbol}</td><td>${x.price??''}</td><td>${x.changePercent??''}</td><td>${x.marketTime??''}</td></tr>`).join('')}
 </table></div>`).join('');
}
async function loadStatus(){
 const r=await fetch('/api/price-status');
 const j=await r.json();
 document.getElementById('status').innerHTML=`状态: ${j.status}<br>缓存更新时间: ${j.updatedAt||'-'}<br>标的数量: ${j.symbols||0}`;
}
async function loadHealth(){
 const r=await fetch('/api/price-health');
 const j=await r.json();
 const cls=j.status==='healthy'?'ok':(j.status==='warning'?'warn':'bad');
 document.getElementById('status').innerHTML=`健康状态: <span class="${cls}">${j.status}</span><br>缓存年龄: ${j.ageMinutes??'-'} 分钟<br>标的数量: ${j.symbols||0}<br>错误数量: ${j.errors||0}`;
}
loadPrice();loadStatus();
</script>
</body>
</html>
