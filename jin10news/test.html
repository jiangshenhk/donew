<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>金十24小时新闻｜运行测试</title>
  <style>
    :root{color-scheme:light;--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--muted:#6e6e73;--line:#d2d2d7;--blue:#0071e3;--green:#248a3d;--red:#d70015;--amber:#b25000}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}
    main{max-width:980px;margin:auto;padding:32px 18px 64px}.head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px}
    h1{font-size:30px;margin:0 0 7px}.sub{color:var(--muted);font-size:14px}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
    button,a.btn{border:0;border-radius:9px;padding:10px 14px;font:inherit;font-size:14px;cursor:pointer;text-decoration:none;background:#e8e8ed;color:var(--text)}
    button.primary{background:var(--blue);color:#fff}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
    .card{background:var(--card);border:1px solid rgba(0,0,0,.06);border-radius:15px;padding:17px;box-shadow:0 4px 20px rgba(0,0,0,.04)}
    .label{font-size:12px;color:var(--muted);margin-bottom:8px}.value{font-size:20px;font-weight:650}.status{display:inline-flex;align-items:center;gap:7px}
    .dot{width:9px;height:9px;border-radius:50%;background:var(--amber)}.ok .dot{background:var(--green)}.bad .dot{background:var(--red)}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:5px}.panel-head h2{font-size:20px;margin:0}
    #message{color:var(--muted);font-size:13px}.news{list-style:none;padding:0;margin:0}.news li{padding:15px 0;border-bottom:1px solid var(--line)}
    .news li:last-child{border:0}.time{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}.content{line-height:1.6}
    .content a{color:inherit;text-decoration:none}.content a:hover{color:var(--blue)}.empty{text-align:center;color:var(--muted);padding:55px 10px}
    .error{background:#fff2f2;color:var(--red);padding:14px;border-radius:10px;margin-top:14px;white-space:pre-wrap}
    @media(max-width:720px){.head{display:block}.actions{justify-content:flex-start;margin-top:16px}.summary{grid-template-columns:1fr 1fr}h1{font-size:25px}}
  </style>
</head>
<body>
<main>
  <section class="head">
    <div><h1>金十24小时新闻测试</h1><div class="sub">检查 GitHub Actions 抓取结果和缓存新鲜度</div></div>
    <div class="actions">
      <button class="primary" id="refresh">立即刷新</button>
      <button id="auto">自动刷新：关</button>
      <a class="btn" href="./data/latest-24h.json" target="_blank">原始 JSON</a>
      <a class="btn" href="https://github.com/jiangshenhk/donew/actions/workflows/update-jin10-news.yml" target="_blank">打开 Actions</a>
    </div>
  </section>
  <section class="summary">
    <div class="card"><div class="label">运行状态</div><div class="value status" id="status"><span class="dot"></span><span>检查中</span></div></div>
    <div class="card"><div class="label">新闻数量</div><div class="value" id="count">—</div></div>
    <div class="card"><div class="label">缓存更新时间</div><div class="value" id="updated" style="font-size:15px">—</div></div>
    <div class="card"><div class="label">距现在</div><div class="value" id="age">—</div></div>
  </section>
  <section class="card">
    <div class="panel-head"><h2>最近24小时</h2><span id="message"></span></div>
    <div id="error"></div>
    <ul class="news" id="news"><li class="empty">正在读取数据…</li></ul>
  </section>
</main>
<script>
  const $=id=>document.getElementById(id);
  let timer=null;
  const fmt=new Intl.DateTimeFormat('zh-CN',{timeZone:'Asia/Shanghai',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  function ageText(date){
    if(!date||isNaN(date))return '尚未更新';
    const mins=Math.max(0,Math.floor((Date.now()-date.getTime())/60000));
    if(mins<1)return '不到1分钟';
    if(mins<60)return mins+'分钟';
    return Math.floor(mins/60)+'小时 '+(mins%60)+'分钟';
  }
  function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  async function load(){
    $('refresh').disabled=true;$('message').textContent='读取中…';$('error').innerHTML='';
    try{
      const res=await fetch('./data/latest-24h.json?t='+Date.now(),{cache:'no-store'});
      if(!res.ok)throw new Error('读取缓存失败：HTTP '+res.status);
      const data=await res.json(), updated=data.updatedAt?new Date(data.updatedAt):null, count=Array.isArray(data.items)?data.items.length:0;
      const minutes=updated?(Date.now()-updated.getTime())/60000:Infinity;
      $('count').textContent=count;$('updated').textContent=updated?fmt.format(updated):'尚未生成';$('age').textContent=ageText(updated);
      $('status').className='value status '+(minutes<=30&&count>0?'ok':minutes<=90&&updated?'':'bad');
      $('status').innerHTML='<span class="dot"></span><span>'+(minutes<=30&&count>0?'正常':updated?(minutes>90?'缓存过期':count?'等待下次更新':'暂无新闻'):'尚未运行')+'</span>';
      $('message').textContent='页面检查：'+fmt.format(new Date());
      if(!count){$('news').innerHTML='<li class="empty">缓存可读取，但目前没有新闻。请打开 Actions 查看最近一次运行日志。</li>';return}
      $('news').innerHTML=data.items.map(item=>{
        const body=esc(item.content), text=item.url?'<a href="'+esc(item.url)+'" target="_blank" rel="noopener">'+body+'</a>':body;
        return '<li><span class="time">'+fmt.format(new Date(item.time))+'</span><div class="content">'+text+'</div></li>'
      }).join('');
    }catch(e){
      $('status').className='value status bad';$('status').innerHTML='<span class="dot"></span><span>读取失败</span>';
      $('message').textContent='';$('error').innerHTML='<div class="error">'+esc(e.message)+'\n请确认 GitHub Pages 已部署最新 main 分支。</div>';
      $('news').innerHTML='';
    }finally{$('refresh').disabled=false}
  }
  $('refresh').onclick=load;
  $('auto').onclick=()=>{
    if(timer){clearInterval(timer);timer=null;$('auto').textContent='自动刷新：关'}
    else{timer=setInterval(load,60000);$('auto').textContent='自动刷新：每分钟'}
  };
  load();
</script>
</body>
</html>
